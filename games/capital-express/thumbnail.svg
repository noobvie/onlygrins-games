<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101c33"/><stop offset=".5" stop-color="#16264a"/><stop offset="1" stop-color="#0a1425"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- night sky -->
  <text x="120" y="100" font-size="34">⭐</text>
  <text x="820" y="80" font-size="28">✨</text>
  <text x="700" y="140" font-size="40">🌙</text>
  <!-- rails -->
  <rect x="0" y="392" width="960" height="14" rx="7" fill="#3a5a94"/>
  <g fill="#22406e">
    <rect x="40" y="386" width="16" height="26" rx="4"/><rect x="160" y="386" width="16" height="26" rx="4"/>
    <rect x="280" y="386" width="16" height="26" rx="4"/><rect x="400" y="386" width="16" height="26" rx="4"/>
    <rect x="520" y="386" width="16" height="26" rx="4"/><rect x="640" y="386" width="16" height="26" rx="4"/>
    <rect x="760" y="386" width="16" height="26" rx="4"/><rect x="880" y="386" width="16" height="26" rx="4"/>
  </g>
  <!-- train + mail -->
  <text x="230" y="380" font-size="130" text-anchor="middle">🚂</text>
  <text x="420" y="360" font-size="76" text-anchor="middle">✉️</text>
  <text x="530" y="330" font-size="60" text-anchor="middle">📦</text>
  <!-- destination sign -->
  <rect x="600" y="200" width="300" height="150" rx="18" fill="#14223f" stroke="#ffb84d" stroke-width="6" stroke-dasharray="18 12"/>
  <text x="750" y="258" font-size="30" font-weight="800" fill="#9fbce8" text-anchor="middle">DELIVER TO:</text>
  <text x="750" y="318" font-size="48" font-weight="800" fill="#eaf2ff" text-anchor="middle">Paris? 🇫🇷</text>
  <!-- globe -->
  <text x="90" y="270" font-size="86" text-anchor="middle">🌍</text>
  <text x="480" y="500" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Capital Express</text>
</svg>
