<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2333"/><stop offset=".5" stop-color="#123a44"/><stop offset="1" stop-color="#08201c"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- before / after panels -->
  <g>
    <rect x="120" y="120" width="280" height="200" rx="18" fill="#0e454a" stroke="#2e8a8a" stroke-width="4"/>
    <text x="260" y="175" font-size="22" font-weight="800" fill="#9fe0e0" text-anchor="middle">BEFORE</text>
    <text x="260" y="270" font-size="96" text-anchor="middle">🕯️</text>
  </g>
  <text x="480" y="235" font-size="60" fill="#ffb84d" text-anchor="middle">➡️</text>
  <g>
    <rect x="560" y="120" width="280" height="200" rx="18" fill="#0e454a" stroke="#3ee87a" stroke-width="4"/>
    <text x="700" y="175" font-size="22" font-weight="800" fill="#3ee87a" text-anchor="middle">AFTER</text>
    <text x="700" y="270" font-size="96" text-anchor="middle">💡</text>
  </g>
  <!-- inspector -->
  <text x="480" y="410" font-size="80" text-anchor="middle">🕵️</text>
  <text x="400" y="390" font-size="40">🔍</text>
  <text x="480" y="480" fill="url(#ttl)" font-size="58" font-weight="800" text-anchor="middle">Invention Inspector</text>
</svg>
