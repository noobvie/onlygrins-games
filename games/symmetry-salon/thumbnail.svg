<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0a36"/><stop offset=".5" stop-color="#3a1248"/><stop offset="1" stop-color="#150420"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8fc7"/><stop offset=".5" stop-color="#ffd166"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- salon mirror with crack -->
  <ellipse cx="480" cy="230" rx="180" ry="200" fill="#240a30" stroke="#ffd166" stroke-width="10"/>
  <!-- monster client reflected -->
  <text x="480" y="260" font-size="120" text-anchor="middle">👹</text>
  <!-- dashed mirror line down the middle -->
  <line x1="480" y1="50" x2="480" y2="420" stroke="#5ad8ff" stroke-width="6" stroke-dasharray="18 14"/>
  <text x="480" y="445" font-size="26" font-weight="800" fill="#5ad8ff" text-anchor="middle">the mirror line</text>
  <!-- shapes waiting for their appointment -->
  <polygon points="120,180 200,180 200,260 120,260" fill="#c77dff" stroke="#ff8fc7" stroke-width="6"/>
  <text x="160" y="300" font-size="26" font-weight="800" fill="#cfa8e8" text-anchor="middle">4 lines</text>
  <polygon points="790,175 850,275 730,275" fill="#c77dff" stroke="#ff8fc7" stroke-width="6"/>
  <text x="790" y="315" font-size="26" font-weight="800" fill="#cfa8e8" text-anchor="middle">3 lines</text>
  <!-- scissors -->
  <text x="150" y="120" font-size="60">✂️</text>
  <text x="830" y="120" font-size="60" text-anchor="end">💇</text>
  <text x="480" y="505" fill="url(#ttl)" font-size="62" font-weight="800" text-anchor="middle">Symmetry Salon</text>
</svg>
