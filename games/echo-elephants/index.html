<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Echo Elephants — OnlyGrins</title>

<script src="/sdk/arcade-sdk.js"></script>
<script src="edu-sdk.js"></script>
<script src="bgm.js" data-cat="memory" data-seed="echo-elephants"></script>

<style>
  :root{
    --bg1:#20303f; --bg2:#324a5e; --bg3:#12202b;
    --card:#233746; --line:#4a6f8a; --text:#eaf4fb; --muted:#aecbe0;
    --green:#7bf0a8; --blue:#6ec8ff; --purple:#c77dff; --gold:#ffd15a; --bad:#ff6b81;
  }
  *{box-sizing:border-box;} html,body{margin:0;height:100%;}
  body{background:linear-gradient(135deg,var(--bg1),var(--bg2) 50%,var(--bg3));
    color:var(--text);font:16px/1.45 "Baloo 2","Comic Sans MS",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100%;padding:16px;
    user-select:none;-webkit-user-select:none;}
  .wrap{width:min(960px,100%);}
  .card{background:var(--card);border:2px solid var(--line);border-radius:22px;
    padding:20px 26px;box-shadow:0 18px 50px rgba(0,0,0,.5);}
  h1{margin:0 0 4px;font-size:clamp(24px,4.5vw,40px);font-weight:800;text-align:center;
    background:linear-gradient(90deg,var(--gold),var(--green),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);text-align:center;margin:0 0 16px;}
  .grades{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
  .gradeBtn{cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:17px;
    padding:14px 20px;border-radius:16px;color:#12202b;box-shadow:0 6px 0 rgba(0,0,0,.35);}
  .gradeBtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.35);}
  .g1{background:var(--green);} .g2{background:var(--blue);} .g3{background:var(--purple);}
  .gradeBtn small{display:block;font-weight:700;font-size:12px;opacity:.75;}

  .top{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-weight:800;}
  .top .round{color:var(--blue);} .top .spacer{flex:1;}
  .top .score{color:var(--green);font-size:20px;}
  .rule{text-align:center;font-weight:800;font-size:clamp(16px,3.2vw,20px);color:var(--gold);margin:6px 0;}
  .rule b{color:var(--blue);}
  .stage{display:flex;justify-content:center;margin:16px 0;}
  .tile{width:clamp(150px,40vw,190px);height:clamp(150px,40vw,190px);border-radius:24px;background:#16242f;
    border:3px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:clamp(70px,20vw,100px);transition:.12s;}
  .tile.hit{border-color:var(--green);background:#12402c;} .tile.miss{border-color:var(--bad);background:#3f1622;}
  .tile.cr{border-color:#3f6f5a;} .tile.fa{border-color:var(--bad);}
  .track{display:flex;gap:5px;justify-content:center;margin:8px 0;}
  .dot{width:10px;height:10px;border-radius:50%;background:#2f4756;}
  .dot.done{background:var(--muted);} .dot.cur{background:var(--gold);}
  .matchWrap{display:flex;justify-content:center;margin-top:8px;}
  .matchBtn{cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:24px;
    padding:18px 44px;border-radius:18px;color:#12202b;background:var(--gold);box-shadow:0 6px 0 rgba(0,0,0,.4);}
  .matchBtn:active{transform:translateY(3px);} .matchBtn:disabled{opacity:.4;}
  .matchBtn.pressed{background:var(--blue);}
  .fb{min-height:24px;text-align:center;font-weight:800;font-size:16px;margin-top:10px;}
  .fb.good{color:var(--green);} .fb.bad{color:var(--bad);} .fb.mut{color:var(--muted);}
  .final{text-align:center;padding:12px 0;}
  .final .big{font-size:58px;font-weight:800;color:var(--green);margin:8px 0;}
  .final p{color:var(--muted);margin:6px 0;} .final .pb{color:var(--green);font-weight:800;}
  .actions{display:flex;justify-content:center;gap:12px;}
  .hidden{display:none!important;}
  .sdknote{margin-top:12px;text-align:center;font:12px ui-monospace,Consolas,monospace;color:#7fa6c4;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">

    <div id="start">
      <h1>🐘 Echo Elephants</h1>
      <p class="sub">Symbols flash by one at a time. Tap <b>MATCH</b> whenever the one showing <b>now</b> is the
        same as the one a step back — you have to remember it, because it's already gone! Elephants never forget.</p>
      <div class="grades">
        <button class="gradeBtn g1" data-grade="0">Grade 1–2<small>1 step back, slow</small></button>
        <button class="gradeBtn g2" data-grade="1">Grade 3<small>2 steps back</small></button>
        <button class="gradeBtn g3" data-grade="2">Grade 4–5<small>2 back, faster</small></button>
      </div>
      <p class="sub">4 streams per run · matches &amp; streaks earn bonus points</p>
    </div>

    <div id="game" class="hidden">
      <div class="top">
        <span class="round" id="roundLbl">Stream 1/4</span>
        <span class="spacer"></span>
        <span class="score">⭐ <span id="scoreVal">0</span></span>
      </div>
      <div class="rule" id="rule"></div>
      <div class="track" id="track"></div>
      <div class="stage"><div class="tile" id="tile"></div></div>
      <div class="matchWrap"><button class="matchBtn" id="matchBtn" disabled>🐘 MATCH!</button></div>
      <div class="fb" id="fb"></div>
    </div>

    <div id="final" class="hidden final">
      <div style="font-size:76px" id="finalEmoji">🐘</div>
      <p id="finalLine"></p>
      <div class="big" id="finalScore">0</div>
      <p id="saveMsg">Saving your score…</p>
      <div class="actions">
        <button class="gradeBtn g1" id="againBtn">New streams ▸</button>
        <button class="gradeBtn g2" id="changeBtn">Change grade</button>
      </div>
    </div>

    <div class="sdknote" id="sdknote"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var GRADES = [
    { id:1, label:'Grade 1–2', n:1, len:10, ms:1500, syms:['🍎','🌟','🐢'] },
    { id:3, label:'Grade 3',   n:2, len:12, ms:1400, syms:['🍎','🌟','🐢','🎈'] },
    { id:4, label:'Grade 4–5', n:2, len:14, ms:1150, syms:['🍎','🌟','🐢','🎈','🐸'] }
  ];
  var STREAMS = 4;

  var grade = GRADES[0], streamNum = 0, score = 0, streak = 0, hits = 0, totalMatches = 0;
  var stream = [], idx = 0, tapped = false, itemTimer = null;

  var $ = function (id){ return document.getElementById(id); };
  function rint(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

  var AC = window.AudioContext || window.webkitAudioContext, actx = null;
  function tone(f,d,t,slide){ try{ actx=actx||new AC(); var o=actx.createOscillator(),g=actx.createGain();
    o.type=t||'sine'; o.frequency.value=f; if(slide)o.frequency.exponentialRampToValueAtTime(slide,actx.currentTime+d);
    g.gain.setValueAtTime(.07,actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+d);}catch(e){} }
  function blip(){ tone(440,.05,'sine'); }
  function good(){ tone(523,.09,'sine'); setTimeout(function(){ tone(784,.16,'sine',1046); },90); }
  function bad(){ tone(200,.25,'sawtooth',90); }

  function makeStream() {
    var n = grade.n, s = [];
    for (var i = 0; i < grade.len; i++) {
      if (i >= n && Math.random() < 0.36) s.push(s[i - n]);       // planted match
      else {
        var c; do { c = pick(grade.syms); } while (i >= n && c === s[i - n]); // avoid accidental match
        s.push(c);
      }
    }
    // ensure at least 2 matches
    var m = 0; for (var k = n; k < s.length; k++) if (s[k] === s[k - n]) m++;
    while (m < 2) { var j = rint(n, s.length - 1); if (s[j] !== s[j - n]) { s[j] = s[j - n]; m++; } }
    return s;
  }

  function beginStream() {
    stream = makeStream(); idx = 0;
    for (var k = grade.n; k < stream.length; k++) if (stream[k] === stream[k - grade.n]) totalMatches++;
    $('roundLbl').textContent = 'Stream ' + (streamNum + 1) + '/' + STREAMS;
    $('rule').innerHTML = 'Tap MATCH when it\'s the same as <b>' + grade.n + ' step' + (grade.n > 1 ? 's' : '') + ' ago</b>';
    drawTrack();
    $('fb').textContent = 'Get ready…'; $('fb').className = 'fb mut';
    $('tile').textContent = '👀'; $('tile').className = 'tile';
    $('matchBtn').disabled = true;
    EduSDK.startLesson(streamNum + 1, { n: grade.n });
    setTimeout(function () { showItem(0); }, 1000);
  }

  function drawTrack() {
    var t = $('track'); t.innerHTML = '';
    for (var i = 0; i < grade.len; i++) {
      var d = document.createElement('div');
      d.className = 'dot' + (i < idx ? ' done' : i === idx ? ' cur' : '');
      t.appendChild(d);
    }
  }

  function showItem(i) {
    idx = i; drawTrack();
    tapped = false;
    var tile = $('tile'); tile.className = 'tile'; tile.textContent = stream[i];
    blip();
    $('matchBtn').disabled = false; $('matchBtn').className = 'matchBtn';
    $('fb').textContent = ''; $('fb').className = 'fb';
    itemTimer = setTimeout(function () { endItem(i); }, grade.ms);
  }

  function endItem(i) {
    $('matchBtn').disabled = true;
    var eligible = i >= grade.n, isMatch = eligible && stream[i] === stream[i - grade.n];
    var tile = $('tile');
    if (tapped && isMatch) {
      hits++; streak++; var pts = 50 + streak * 5; score += pts;
      tile.classList.add('hit'); good(); $('fb').textContent = 'Match! +' + pts; $('fb').className = 'fb good';
    } else if (tapped && !isMatch) {
      streak = 0; tile.classList.add('fa'); bad(); $('fb').textContent = 'No match there.'; $('fb').className = 'fb bad';
    } else if (!tapped && isMatch) {
      streak = 0; tile.classList.add('miss'); bad(); $('fb').textContent = 'Missed a match!'; $('fb').className = 'fb bad';
    } else {
      streak++; var p2 = 8; score += p2; tile.classList.add('cr'); $('fb').textContent = ''; $('fb').className = 'fb';
    }
    $('scoreVal').textContent = score;
    setTimeout(function () {
      if (i + 1 < grade.len) showItem(i + 1);
      else endStream();
    }, 450);
  }

  function endStream() {
    EduSDK.finishLesson(streamNum + 1, { hits: hits });
    streamNum++;
    $('tile').textContent = '🐘'; $('tile').className = 'tile';
    if (streamNum >= STREAMS) return setTimeout(finish, 900);
    if (streamNum === Math.floor(STREAMS / 2)) setTimeout(function(){ EduSDK.adBreak('interlevel').then(beginStream); }, 900);
    else setTimeout(beginStream, 900);
  }

  function onMatch() {
    if ($('matchBtn').disabled || tapped) return;
    tapped = true; $('matchBtn').className = 'matchBtn pressed'; blip();
  }

  function finish() {
    $('game').classList.add('hidden'); $('final').classList.remove('hidden');
    $('finalScore').textContent = score;
    var rate = totalMatches ? hits / totalMatches : 0;
    $('finalEmoji').textContent = rate >= 0.85 ? '🐘🏆' : rate >= 0.5 ? '🐘🌟' : '🐘🥜';
    $('finalLine').textContent = grade.label + ' — caught ' + hits + ' of ' + totalMatches + ' matches. ' +
      (rate >= 0.85 ? 'An elephant\'s memory — nothing gets past you!' :
       rate >= 0.5 ? 'Strong working memory — keep it up!' :
       'Hold each symbol in your mind as the next arrives — you\'ll improve fast!');
    EduSDK.submitScore(score, { grade: grade.id, hits: hits, matches: totalMatches })
      .then(function (res) {
        var el = $('saveMsg');
        if (res && res.success) el.innerHTML = res.isPersonalBest
          ? '<span class="pb">🏆 New personal best — on the leaderboard!</span>' : 'Score saved to the leaderboard.';
        else if (res && res.offline) el.textContent = 'Standalone mode — play on OnlyGrins to earn GP!';
        else el.textContent = (res && res.error === 'not_authenticated') ? 'Sign in on OnlyGrins to save your score.' : 'Could not save score.';
      })
      .then(function () { return EduSDK.end({ score: score }); });
  }

  function startGame(g) {
    grade = g; streamNum = 0; score = 0; streak = 0; hits = 0; totalMatches = 0;
    $('scoreVal').textContent = '0';
    $('start').classList.add('hidden'); $('final').classList.add('hidden');
    $('game').classList.remove('hidden');
    beginStream();
  }

  Array.prototype.forEach.call(document.querySelectorAll('#start .gradeBtn'), function (b) {
    b.addEventListener('click', function () { startGame(GRADES[Number(b.dataset.grade)]); });
  });
  $('matchBtn').addEventListener('click', onMatch);
  $('againBtn').addEventListener('click', function () { startGame(grade); });
  $('changeBtn').addEventListener('click', function () {
    $('final').classList.add('hidden'); $('start').classList.remove('hidden');
  });

  $('sdknote').textContent = EduSDK.isHosted() ? 'SDK: connected' : 'SDK: standalone (scoring no-ops)';
  EduSDK.begin({ game: 'echo-elephants' });
})();
</script>
</body>
</html>
