<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13204a"/><stop offset=".5" stop-color="#1a1140"/><stop offset="1" stop-color="#0c2a3a"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ee87a"/><stop offset=".4" stop-color="#5ad8ff"/><stop offset=".7" stop-color="#c77dff"/><stop offset="1" stop-color="#ff8a5c"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- bubbles -->
  <g fill="#aee9ff" opacity=".08">
    <circle cx="120" cy="120" r="26"/><circle cx="840" cy="90" r="18"/><circle cx="760" cy="430" r="30"/><circle cx="180" cy="420" r="16"/><circle cx="500" cy="80" r="12"/>
  </g>
  <!-- snake body -->
  <g>
    <circle cx="200" cy="360" r="20" fill="#5ad8ff"/><circle cx="250" cy="350" r="22" fill="#56c8ff"/>
    <circle cx="300" cy="335" r="24" fill="#7db8ff" /><circle cx="352" cy="330" r="26" fill="#9b9bff"/>
    <circle cx="408" cy="340" r="28" fill="#c77dff"/>
    <!-- head -->
    <circle cx="470" cy="358" r="34" fill="#ffffff"/>
    <circle cx="486" cy="350" r="7" fill="#0a1230"/><circle cx="464" cy="366" r="7" fill="#0a1230"/>
    <text x="470" y="300" fill="#06122a" font-size="34" font-weight="800" text-anchor="middle">10</text>
  </g>
  <!-- tokens -->
  <g font-size="34" font-weight="800" text-anchor="middle">
    <circle cx="640" cy="200" r="40" fill="#3ee87a"/><text x="640" y="213" fill="#06122a">+5</text>
    <circle cx="780" cy="320" r="40" fill="#c77dff"/><text x="780" y="333" fill="#06122a">×2</text>
    <circle cx="690" cy="430" r="38" fill="#ff8a5c"/><text x="690" y="443" fill="#06122a">−3</text>
    <circle cx="560" cy="420" r="34" fill="#5ad8ff"/><text x="560" y="432" fill="#06122a">÷2</text>
  </g>
  <!-- target -->
  <text x="480" y="120" fill="#bfe6ff" font-size="22" font-weight="600" text-anchor="middle" letter-spacing="4">REACH</text>
  <text x="480" y="178" fill="#9be7ff" font-size="56" font-weight="800" text-anchor="middle">20</text>
  <!-- title -->
  <text x="480" y="510" fill="url(#ttl)" font-size="60" font-weight="800" text-anchor="middle">Grin Math Snake</text>
</svg>
