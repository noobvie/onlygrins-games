<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13204a"/><stop offset=".5" stop-color="#1a1140"/><stop offset="1" stop-color="#0c2a3a"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ee87a"/><stop offset=".5" stop-color="#c77dff"/><stop offset="1" stop-color="#ff8a5c"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- robot -->
  <text x="170" y="300" font-size="150" text-anchor="middle">🤖</text>
  <g>
    <rect x="290" y="120" width="330" height="70" rx="18" fill="#0d1533" stroke="#2b3a77" stroke-width="4"/>
    <text x="455" y="165" fill="#9fb4e0" font-size="26" font-weight="700" text-anchor="middle">"Dog the ate homework my."</text>
    <text x="640" y="165" font-size="26">😑</text>
  </g>
  <!-- word tiles scattered like salad -->
  <g font-size="30" font-weight="800" text-anchor="middle">
    <rect x="380" y="240" width="120" height="58" rx="12" fill="#5ad8ff" transform="rotate(-8 440 269)"/>
    <text x="440" y="278" fill="#06122a" transform="rotate(-8 440 269)">The</text>
    <rect x="530" y="230" width="130" height="58" rx="12" fill="#3ee87a" transform="rotate(6 595 259)"/>
    <text x="595" y="268" fill="#06122a" transform="rotate(6 595 259)">dog</text>
    <rect x="690" y="250" width="120" height="58" rx="12" fill="#c77dff" transform="rotate(-5 750 279)"/>
    <text x="750" y="288" fill="#06122a" transform="rotate(-5 750 279)">ate</text>
    <rect x="450" y="330" width="150" height="58" rx="12" fill="#ff8a5c" transform="rotate(4 525 359)"/>
    <text x="525" y="368" fill="#06122a" transform="rotate(4 525 359)">my</text>
    <rect x="640" y="340" width="180" height="58" rx="12" fill="#ffd166" transform="rotate(-6 730 369)"/>
    <text x="730" y="378" fill="#06122a" transform="rotate(-6 730 369)">sock</text>
  </g>
  <text x="360" y="440" font-size="56">🥗</text>
  <text x="480" y="505" fill="url(#ttl)" font-size="58" font-weight="800" text-anchor="middle">Silly Sentence Salad</text>
</svg>
