<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2e24"/><stop offset=".5" stop-color="#154032"/><stop offset="1" stop-color="#081a14"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#ff8fc0"/><stop offset="1" stop-color="#c77dff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="90" y="160" font-size="66">🐾</text>
  <!-- shelf of pets, one vanished -->
  <g>
    <rect x="200" y="110" width="120" height="120" rx="18" fill="#0f382b" stroke="#2f7a5c" stroke-width="3"/><text x="260" y="197" font-size="64" text-anchor="middle">🐶</text>
    <rect x="335" y="110" width="120" height="120" rx="18" fill="#0f382b" stroke="#2f7a5c" stroke-width="3"/><text x="395" y="197" font-size="64" text-anchor="middle">🐱</text>
    <rect x="470" y="110" width="120" height="120" rx="18" fill="#3a2f10" stroke="#ffb84d" stroke-width="3" stroke-dasharray="8 6"/><text x="530" y="200" font-size="60" text-anchor="middle">❓</text>
    <rect x="605" y="110" width="120" height="120" rx="18" fill="#0f382b" stroke="#2f7a5c" stroke-width="3"/><text x="665" y="197" font-size="64" text-anchor="middle">🦊</text>
    <rect x="740" y="110" width="120" height="120" rx="18" fill="#0f382b" stroke="#2f7a5c" stroke-width="3"/><text x="800" y="197" font-size="64" text-anchor="middle">🐰</text>
  </g>
  <text x="530" y="300" font-size="34" font-weight="800" fill="#ff8fc0" text-anchor="middle">Which pet vanished? 🙈</text>
  <text x="480" y="420" fill="url(#ttl)" font-size="60" font-weight="800" text-anchor="middle">Pair-a-Dice Pets</text>
  <text x="480" y="466" fill="#a6d9c4" font-size="26" font-weight="700" text-anchor="middle">Study the shelf — remember it all!</text>
</svg>
