<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13204a"/><stop offset=".5" stop-color="#1a1140"/><stop offset="1" stop-color="#0c2a3a"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4d7cff"/><stop offset=".5" stop-color="#eaf2ff"/><stop offset="1" stop-color="#ff6b81"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- customer + speech bubble -->
  <text x="180" y="310" font-size="150" text-anchor="middle">🐐</text>
  <g>
    <rect x="300" y="90" width="420" height="90" rx="20" fill="#0d1533" stroke="#2b3a77" stroke-width="4"/>
    <text x="510" y="135" fill="#ffd166" font-size="30" font-weight="800" text-anchor="middle">« Je voudrais un croissant,</text>
    <text x="510" y="168" fill="#ffd166" font-size="30" font-weight="800" text-anchor="middle">s'il vous plaît ! »</text>
  </g>
  <!-- tray of dishes -->
  <g text-anchor="middle">
    <rect x="360" y="230" width="120" height="120" rx="18" fill="#0d1533" stroke="#2b3a77" stroke-width="4"/>
    <text x="420" y="315" font-size="64">🥐</text>
    <rect x="500" y="230" width="120" height="120" rx="18" fill="#0d1533" stroke="#2b3a77" stroke-width="4"/>
    <text x="560" y="315" font-size="64">🧀</text>
    <rect x="640" y="230" width="120" height="120" rx="18" fill="#0d1533" stroke="#2b3a77" stroke-width="4"/>
    <text x="700" y="315" font-size="64">🍎</text>
    <rect x="780" y="230" width="120" height="120" rx="18" fill="#0d1533" stroke="#2b3a77" stroke-width="4"/>
    <text x="840" y="315" font-size="64">🧦</text>
  </g>
  <text x="630" y="410" fill="#9fb4e0" font-size="22" font-weight="700" text-anchor="middle">serve the wrong one and they FAINT. dramatically. 🇫🇷</text>
  <text x="480" y="500" fill="url(#ttl)" font-size="60" font-weight="800" text-anchor="middle">Café Français</text>
</svg>
