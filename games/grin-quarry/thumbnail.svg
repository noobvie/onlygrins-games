<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#87b5e0"/><stop offset="1" stop-color="#5a8ac0"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#sky)"/>
  <!-- pixel clouds -->
  <g fill="#ffffff" opacity=".85">
    <rect x="90" y="70" width="90" height="22"/><rect x="120" y="50" width="70" height="22"/>
    <rect x="720" y="100" width="100" height="22"/><rect x="750" y="80" width="60" height="22"/>
  </g>
  <!-- ground -->
  <rect x="0" y="440" width="960" height="100" fill="#4aa832"/>
  <rect x="0" y="440" width="960" height="16" fill="#66c94a"/>
  <!-- iso block chunk 3x2x2 (stone) -->
  <g stroke="#14141a" stroke-width="3">
    <!-- painterly iso cubes -->
    <g transform="translate(560 170) scale(1.15)">
      <!-- helper cubes drawn as three-face groups -->
      <!-- layer 1 -->
      <g>
        <polygon points="0,120 60,90 120,120 60,150" fill="#a8a8b0"/>
        <polygon points="0,120 60,150 60,210 0,180" fill="#6e6e76"/>
        <polygon points="120,120 60,150 60,210 120,180" fill="#8a8a92"/>
        <polygon points="60,90 120,60 180,90 120,120" fill="#a8a8b0"/>
        <polygon points="120,120 180,90 180,150 120,180" fill="#8a8a92"/>
        <polygon points="-60,90 0,60 60,90 0,120" fill="#a8a8b0"/>
        <polygon points="-60,90 0,120 0,180 -60,150" fill="#6e6e76"/>
      </g>
      <!-- layer 2 -->
      <g>
        <polygon points="0,60 60,30 120,60 60,90" fill="#b4b4bc"/>
        <polygon points="0,60 60,90 60,150 0,120" fill="#75757e"/>
        <polygon points="120,60 60,90 60,150 120,120" fill="#92929a"/>
      </g>
    </g>
  </g>
  <!-- measurement callout -->
  <rect x="120" y="150" width="300" height="150" fill="#20301a" stroke="#101c0a" stroke-width="8"/>
  <text x="270" y="205" font-size="34" font-weight="800" fill="#eefae0" text-anchor="middle">4 × 3 × 2 hole…</text>
  <text x="270" y="262" font-size="48" font-weight="800" fill="#3ee87a" text-anchor="middle">? blocks</text>
  <!-- pickaxe + miner -->
  <text x="160" y="440" font-size="90">⛏️</text>
  <text x="820" y="450" font-size="76">👷</text>
  <!-- title with blocky shadow -->
  <text x="484" y="514" font-size="66" font-weight="800" fill="#101c0a" text-anchor="middle">Grin Quarry</text>
  <text x="480" y="510" font-size="66" font-weight="800" fill="#eefae0" text-anchor="middle">Grin Quarry</text>
</svg>
