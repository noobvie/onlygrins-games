<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2333"/><stop offset=".5" stop-color="#123347"/><stop offset="1" stop-color="#081a24"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- robot chef -->
  <text x="180" y="290" font-size="150" text-anchor="middle">🤖</text>
  <text x="180" y="180" font-size="52" text-anchor="middle">👨‍🍳</text>
  <!-- ordered program steps -->
  <g>
    <rect x="380" y="100" width="480" height="60" rx="12" fill="#134458" stroke="#3ee87a" stroke-width="3"/>
    <text x="404" y="140" font-size="26" font-weight="800" fill="#9fcfe8">1.</text>
    <text x="448" y="140" font-size="34">🍞</text><text x="500" y="140" font-size="22" font-weight="800" fill="#e6f6ff">Get the bread</text>
    <rect x="380" y="175" width="480" height="60" rx="12" fill="#134458" stroke="#3ee87a" stroke-width="3"/>
    <text x="404" y="215" font-size="26" font-weight="800" fill="#9fcfe8">2.</text>
    <text x="448" y="215" font-size="34">🧈</text><text x="500" y="215" font-size="22" font-weight="800" fill="#e6f6ff">Spread butter</text>
    <rect x="380" y="250" width="480" height="60" rx="12" fill="#134458" stroke="#3ee87a" stroke-width="3"/>
    <text x="404" y="290" font-size="26" font-weight="800" fill="#9fcfe8">3.</text>
    <text x="448" y="290" font-size="34">🧀</text><text x="500" y="290" font-size="22" font-weight="800" fill="#e6f6ff">Add the cheese</text>
    <rect x="380" y="325" width="480" height="60" rx="12" fill="#0e2a3d" stroke="#ffb84d" stroke-width="3" stroke-dasharray="12 8"/>
    <text x="404" y="365" font-size="26" font-weight="800" fill="#ffb84d">?</text>
    <text x="448" y="365" font-size="34">🥪</text><text x="500" y="365" font-size="22" font-weight="800" fill="#ffb84d">…serve it!</text>
  </g>
  <text x="480" y="490" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Recipe Robot</text>
</svg>
