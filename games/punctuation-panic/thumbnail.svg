<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24240a"/><stop offset=".5" stop-color="#333310"/><stop offset="1" stop-color="#121204"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd166"/><stop offset=".5" stop-color="#ff6b81"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- the ticking sentence-bomb -->
  <rect x="140" y="120" width="680" height="120" rx="18" fill="#20200a" stroke="#ffd166" stroke-width="6"/>
  <text x="480" y="196" font-size="46" font-weight="800" fill="#fffde8" text-anchor="middle">Let's eat<tspan fill="#ff6b81" font-size="60">,</tspan> Grandma<tspan fill="#3ee87a" font-size="60">!</tspan></text>
  <text x="120" y="200" font-size="70" text-anchor="middle">💣</text>
  <!-- fuse spark -->
  <text x="120" y="110" font-size="44" text-anchor="middle">✨</text>
  <!-- grandma, unamused -->
  <text x="820" y="360" font-size="110" text-anchor="middle">👵</text>
  <text x="820" y="410" font-size="24" font-weight="800" fill="#d8d49a" text-anchor="middle">NOT amused</text>
  <!-- wire cutters + punctuation to choose -->
  <text x="170" y="370" font-size="80" text-anchor="middle">✂️</text>
  <g font-size="64" font-weight="800" text-anchor="middle">
    <circle cx="360" cy="345" r="44" fill="#20200a" stroke="#3ee87a" stroke-width="6"/><text x="360" y="368" fill="#3ee87a">,</text>
    <circle cx="480" cy="345" r="44" fill="#20200a" stroke="#5ad8ff" stroke-width="6"/><text x="480" y="368" fill="#5ad8ff">?</text>
    <circle cx="600" cy="345" r="44" fill="#20200a" stroke="#ff6b81" stroke-width="6"/><text x="600" y="368" fill="#ff6b81">!</text>
  </g>
  <text x="480" y="495" fill="url(#ttl)" font-size="62" font-weight="800" text-anchor="middle">Punctuation Panic</text>
</svg>
