      <text x="465" y="335" font-size="34">🦡</text><text x="465" y="393" font-size="52" fill="#f2ffe4">12</text>
    </g>
    <g>
      <rect x="570" y="285" width="150" height="130" rx="18" fill="#4a1e26" stroke="#ff6b81" stroke-width="5"/>
