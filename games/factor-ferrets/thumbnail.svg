<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26331c"/><stop offset=".5" stop-color="#324122"/><stop offset="1" stop-color="#161f10"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#8fe15a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="480" y="92" fill="#ffb84d" font-size="34" font-weight="800" text-anchor="middle">Catch every factor of 12!</text>
  <!-- burrow cards -->
  <g font-weight="800" text-anchor="middle">
    <g>
      <rect x="120" y="130" width="150" height="130" rx="18" fill="#2f5222" stroke="#8fe15a" stroke-width="5"/>
      <text x="195" y="180" font-size="34">🦡</text><text x="195" y="238" font-size="52" fill="#f2ffe4">3</text>
    </g>
    <g>
      <rect x="300" y="130" width="150" height="130" rx="18" fill="#3b4d29" stroke="#5f7a3a" stroke-width="5"/>
      <text x="375" y="180" font-size="34">🐹</text><text x="375" y="238" font-size="52" fill="#c2d69c">7</text>
    </g>
    <g>
      <rect x="480" y="130" width="150" height="130" rx="18" fill="#2f5222" stroke="#8fe15a" stroke-width="5"/>
      <text x="555" y="180" font-size="34">🦫</text><text x="555" y="238" font-size="52" fill="#f2ffe4">4</text>
    </g>
    <g>
      <rect x="660" y="130" width="150" height="130" rx="18" fill="#5a4a1e" stroke="#ffb84d" stroke-width="6"/>
      <text x="735" y="180" font-size="34">🐭</text><text x="735" y="238" font-size="52" fill="#f2ffe4">6</text>
    </g>
    <g>
      <rect x="210" y="285" width="150" height="130" rx="18" fill="#3b4d29" stroke="#5f7a3a" stroke-width="5"/>
      <text x="285" y="335" font-size="34">🐾</text><text x="285" y="393" font-size="52" fill="#c2d69c">9</text>
