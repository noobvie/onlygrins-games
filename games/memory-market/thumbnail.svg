    <rect x="365" y="110" width="110" height="110" rx="16" fill="url(#bk)"/><text x="420" y="190" font-size="52" text-anchor="middle">❓</text>
    <rect x="490" y="110" width="110" height="110" rx="16" fill="url(#bk)"/><text x="545" y="190" font-size="52" text-anchor="middle">❓</text>
    <rect x="615" y="110" width="110" height="110" rx="16" fill="#f3e8ff"/><text x="670" y="188" font-size="56" text-anchor="middle">🍎</text>
    <rect x="240" y="235" width="110" height="110" rx="16" fill="url(#bk)"/><text x="295" y="315" font-size="52" text-anchor="middle">❓</text>
