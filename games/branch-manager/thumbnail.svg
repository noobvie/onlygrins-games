<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2e1e"/><stop offset=".5" stop-color="#123f2a"/><stop offset="1" stop-color="#082014"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- capitol dome -->
  <path d="M 400 130 Q 480 60 560 130 Z" fill="#2e8a5a"/>
  <rect x="400" y="130" width="160" height="20" fill="#2e8a5a"/>
  <!-- three branch buckets -->
  <g>
    <rect x="90" y="220" width="230" height="230" rx="18" fill="#124430" stroke="#2e8a5a" stroke-width="4"/>
    <text x="205" y="310" font-size="64" text-anchor="middle">📜</text>
    <text x="205" y="365" font-size="26" font-weight="800" fill="#e6fff0" text-anchor="middle">Lawmakers</text>
    <text x="205" y="400" font-size="17" font-weight="700" fill="#9fe0c0" text-anchor="middle">MAKE laws</text>
    <rect x="365" y="220" width="230" height="230" rx="18" fill="#124430" stroke="#2e8a5a" stroke-width="4"/>
    <text x="480" y="310" font-size="64" text-anchor="middle">🎖️</text>
    <text x="480" y="365" font-size="26" font-weight="800" fill="#e6fff0" text-anchor="middle">Leaders</text>
    <text x="480" y="400" font-size="17" font-weight="700" fill="#9fe0c0" text-anchor="middle">CARRY them out</text>
    <rect x="640" y="220" width="230" height="230" rx="18" fill="#124430" stroke="#2e8a5a" stroke-width="4"/>
    <text x="755" y="310" font-size="64" text-anchor="middle">⚖️</text>
    <text x="755" y="365" font-size="26" font-weight="800" fill="#e6fff0" text-anchor="middle">Judges</text>
    <text x="755" y="400" font-size="17" font-weight="700" fill="#9fe0c0" text-anchor="middle">DECIDE what's fair</text>
  </g>
  <text x="480" y="500" fill="url(#ttl)" font-size="58" font-weight="800" text-anchor="middle">Branch Manager</text>
</svg>
