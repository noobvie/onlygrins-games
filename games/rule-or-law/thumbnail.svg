<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2733"/><stop offset=".5" stop-color="#123a47"/><stop offset="1" stop-color="#081c24"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- statement card up top -->
  <rect x="270" y="80" width="420" height="90" rx="16" fill="#0a2530" stroke="#ffb84d" stroke-width="4" stroke-dasharray="14 10"/>
  <text x="330" y="140" font-size="44" text-anchor="middle">🚦</text>
  <text x="520" y="135" font-size="24" font-weight="800" fill="#e6f8ff" text-anchor="middle">Stop at a red light</text>
  <!-- two buckets -->
  <g>
    <rect x="120" y="240" width="300" height="210" rx="18" fill="#124050" stroke="#2e7a9a" stroke-width="4"/>
    <text x="270" y="330" font-size="70" text-anchor="middle">🏠</text>
    <text x="270" y="390" font-size="32" font-weight="800" fill="#e6f8ff" text-anchor="middle">RULE</text>
    <text x="270" y="422" font-size="16" font-weight="700" fill="#9fcfe8" text-anchor="middle">made by people near you</text>
    <rect x="540" y="240" width="300" height="210" rx="18" fill="#124050" stroke="#3ee87a" stroke-width="5"/>
    <text x="690" y="330" font-size="70" text-anchor="middle">🏛️</text>
    <text x="690" y="390" font-size="32" font-weight="800" fill="#3ee87a" text-anchor="middle">LAW</text>
    <text x="690" y="422" font-size="16" font-weight="700" fill="#9fcfe8" text-anchor="middle">everyone must follow</text>
  </g>
  <text x="480" y="500" fill="url(#ttl)" font-size="60" font-weight="800" text-anchor="middle">Rule or Law?</text>
</svg>
