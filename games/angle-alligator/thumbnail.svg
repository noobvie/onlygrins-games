<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2e1a"/><stop offset=".5" stop-color="#144024"/><stop offset="1" stop-color="#06180d"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ee87a"/><stop offset=".5" stop-color="#ffd166"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- swamp reeds -->
  <text x="70" y="150" font-size="60">🌿</text>
  <text x="880" y="180" font-size="60" text-anchor="end">🌿</text>
  <!-- the jaw angle -->
  <g transform="translate(280,330)">
    <path d="M 70 0 A 70 70 0 0 0 49.5 -49.5" fill="none" stroke="#ffd166" stroke-width="6"/>
    <line x1="0" y1="0" x2="380" y2="0" stroke="#3ee87a" stroke-width="18" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="268" y2="-268" stroke="#3ee87a" stroke-width="18" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="16" fill="#ffd166"/>
    <text x="-70" y="14" font-size="80" text-anchor="middle">🐊</text>
    <text x="150" y="-70" font-size="64">🍩</text>
    <text x="120" y="-14" font-size="40" font-weight="800" fill="#ffd166">45°?</text>
  </g>
  <!-- dentist bird waiting -->
  <text x="810" y="330" font-size="70" text-anchor="middle">🐦</text>
  <text x="810" y="375" font-size="24" font-weight="800" fill="#9ad8ae" text-anchor="middle">the dentist bird</text>
  <text x="480" y="490" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Angle Alligator</text>
</svg>
