<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13204a"/><stop offset=".55" stop-color="#0e2c50"/><stop offset="1" stop-color="#123c6b"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ee87a"/><stop offset=".5" stop-color="#5ad8ff"/><stop offset="1" stop-color="#c77dff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- jumping frog -->
  <text x="300" y="180" font-size="120" text-anchor="middle" transform="rotate(-15 300 180)">🐸</text>
  <text x="420" y="100" font-size="30" font-weight="800" fill="#3ee87a" transform="rotate(8 420 100)">BOING !</text>
  <!-- speech bubble -->
  <g>
    <rect x="470" y="130" width="330" height="70" rx="18" fill="#0d1533" stroke="#2b3a77" stroke-width="4"/>
    <text x="635" y="175" fill="#ffd166" font-size="30" font-weight="800" text-anchor="middle">« Bonjour ! »</text>
  </g>
  <!-- lily pads with words -->
  <g text-anchor="middle" font-weight="800">
    <ellipse cx="250" cy="360" rx="110" ry="48" fill="#2fae66" stroke="#1d7a45" stroke-width="5"/>
    <text x="250" y="372" font-size="28" fill="#06301c">bonjour ✓</text>
    <ellipse cx="510" cy="380" rx="100" ry="46" fill="#2fae66" stroke="#1d7a45" stroke-width="5"/>
    <text x="510" y="392" font-size="28" fill="#06301c">merci</text>
    <ellipse cx="750" cy="355" rx="100" ry="46" fill="#e5566d" stroke="#a3243c" stroke-width="5"/>
    <text x="750" y="367" font-size="28" fill="#3a0a12">au revoir</text>
  </g>
  <text x="750" y="440" font-size="34" text-anchor="middle">💦</text>
  <text x="855" y="430" font-size="26" font-weight="800" fill="#ff6b81" transform="rotate(8 855 430)">SPLOOSH</text>
  <text x="480" y="505" fill="url(#ttl)" font-size="56" font-weight="800" text-anchor="middle">Froggy French Phrases</text>
</svg>
