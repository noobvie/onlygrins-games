<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#122f36"/><stop offset=".5" stop-color="#1c4a52"/><stop offset="1" stop-color="#0a1f23"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd15a"/><stop offset=".5" stop-color="#7bf0a8"/><stop offset="1" stop-color="#ff9ec7"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="480" y="140" font-size="70" text-anchor="middle">🦔</text>
  <text x="360" y="120" font-size="34">🎶</text><text x="610" y="115" font-size="30">🎵</text>
  <text x="480" y="205" fill="#a9dce0" font-size="26" font-weight="800" text-anchor="middle">Happy, sad or spooky?</text>
  <!-- three feeling options -->
  <g font-weight="800" text-anchor="middle" fill="#eafcff" font-size="24">
    <rect x="180" y="240" width="180" height="130" rx="16" fill="#12463a" stroke="#7bf0a8" stroke-width="5"/><text x="270" y="315" font-size="52">😊</text><text x="270" y="355">Happy</text>
    <rect x="390" y="240" width="180" height="130" rx="16" fill="#123338" stroke="#3f8a92" stroke-width="3"/><text x="480" y="315" font-size="52">😢</text><text x="480" y="355">Sad</text>
    <rect x="600" y="240" width="180" height="130" rx="16" fill="#123338" stroke="#3f8a92" stroke-width="3"/><text x="690" y="315" font-size="52">👻</text><text x="690" y="355">Spooky</text>
  </g>
  <text x="480" y="475" fill="url(#ttl)" font-size="58" font-weight="800" text-anchor="middle">Harmony Hedgehogs</text>
</svg>
