<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#053a58"/><stop offset=".6" stop-color="#03253a"/><stop offset="1" stop-color="#021826"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- light rays -->
  <polygon points="380,0 480,0 340,240" fill="#5ad8ff" opacity=".08"/>
  <polygon points="520,0 640,0 560,260" fill="#5ad8ff" opacity=".07"/>
  <!-- bubbles -->
  <circle cx="140" cy="120" r="12" fill="none" stroke="#5ad8ff" stroke-width="3" opacity=".5"/>
  <circle cx="180" cy="70" r="8" fill="none" stroke="#5ad8ff" stroke-width="3" opacity=".4"/>
  <circle cx="820" cy="150" r="10" fill="none" stroke="#5ad8ff" stroke-width="3" opacity=".5"/>
  <!-- submarine -->
  <g>
    <ellipse cx="330" cy="250" rx="180" ry="80" fill="#ffb84d"/>
    <rect x="270" y="140" width="80" height="60" rx="16" fill="#ffb84d"/>
    <circle cx="250" cy="250" r="26" fill="#06304a" stroke="#e6f7ff" stroke-width="6"/>
    <circle cx="330" cy="250" r="26" fill="#06304a" stroke="#e6f7ff" stroke-width="6"/>
    <circle cx="410" cy="250" r="26" fill="#06304a" stroke="#e6f7ff" stroke-width="6"/>
    <ellipse cx="520" cy="250" rx="34" ry="20" fill="#e8a53a"/>
    <text x="310" y="185" font-size="34" text-anchor="middle">😀</text>
  </g>
  <!-- sea life + question -->
  <text x="740" y="280" font-size="100" text-anchor="middle">🐙</text>
  <text x="850" y="180" font-size="56" text-anchor="middle">❓</text>
  <text x="640" y="420" font-size="60" text-anchor="middle">🐠</text>
  <text x="180" y="430" font-size="56" text-anchor="middle">🐋</text>
  <text x="880" y="430" font-size="48" text-anchor="middle">🏔️</text>
  <text x="480" y="500" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Ocean Commotion</text>
</svg>
