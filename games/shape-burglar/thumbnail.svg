<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1030"/><stop offset=".5" stop-color="#241640"/><stop offset="1" stop-color="#101a38"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#c77dff"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- moonlight spotlight -->
  <polygon points="480,0 260,540 700,540" fill="#ffffff" opacity=".06"/>
  <!-- wanted poster -->
  <g transform="rotate(-4 240 190)">
    <rect x="90" y="80" width="300" height="220" rx="14" fill="#f7e3b0" stroke="#c99b57" stroke-width="8"/>
    <text x="240" y="135" font-size="30" font-weight="800" fill="#8a5a1e" text-anchor="middle" letter-spacing="8">★ WANTED ★</text>
    <text x="240" y="195" font-size="44" font-weight="800" fill="#4a2c10" text-anchor="middle">a TRIANGLE</text>
    <polygon points="240,215 275,270 205,270" fill="#c77dff"/>
  </g>
  <!-- burglar raccoon with loot -->
  <text x="600" y="330" font-size="150" text-anchor="middle">🦝</text>
  <text x="710" y="360" font-size="80" text-anchor="middle">💼</text>
  <!-- floating loot shapes -->
  <circle cx="810" cy="120" r="42" fill="#5ad8ff"/>
  <rect x="700" y="70" width="66" height="66" fill="#3ee87a" transform="rotate(12 733 103)"/>
  <polygon points="880,230 912,290 848,290" fill="#ffb84d"/>
  <polygon points="490,95 502,127 536,127 509,147 519,180 490,160 461,180 471,147 444,127 478,127" fill="#ff8fa3"/>
  <!-- alarm -->
  <text x="120" y="420" font-size="56">🚨</text>
  <text x="480" y="490" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Shape Burglar</text>
</svg>
