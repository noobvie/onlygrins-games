<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1630"/><stop offset=".5" stop-color="#2b2450"/><stop offset="1" stop-color="#0f0c1f"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ec8ff"/><stop offset=".5" stop-color="#ff9ec7"/><stop offset="1" stop-color="#ffd15a"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="330" y="90" font-size="44" text-anchor="middle">🦅</text>
  <!-- venn -->
  <g>
    <circle cx="410" cy="240" r="150" fill="#6ec8ff" fill-opacity="0.28" stroke="#6ec8ff" stroke-width="5"/>
    <circle cx="560" cy="240" r="150" fill="#ff9ec7" fill-opacity="0.28" stroke="#ff9ec7" stroke-width="5"/>
    <text x="330" y="150" fill="#6ec8ff" font-size="30" font-weight="800" text-anchor="middle">Animal</text>
    <text x="640" y="150" fill="#ff9ec7" font-size="30" font-weight="800" text-anchor="middle">Can fly</text>
    <text x="320" y="255" font-size="52" text-anchor="middle">🐕</text>
    <text x="485" y="255" font-size="52" text-anchor="middle">🦋</text>
    <text x="650" y="255" font-size="52" text-anchor="middle">✈️</text>
    <text x="485" y="315" fill="#c77dff" font-size="20" font-weight="800" text-anchor="middle">both</text>
    <text x="820" y="380" font-size="48" text-anchor="middle">🪨</text>
    <text x="820" y="410" fill="#bcb0e8" font-size="18" font-weight="800" text-anchor="middle">neither</text>
  </g>
  <text x="480" y="480" fill="url(#ttl)" font-size="66" font-weight="800" text-anchor="middle">Venn Vultures</text>
</svg>
