<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e1206"/><stop offset=".5" stop-color="#40200a"/><stop offset="1" stop-color="#180a02"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd166"/><stop offset=".5" stop-color="#ff6b81"/><stop offset="1" stop-color="#c77dff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- two hotel doors -->
  <rect x="180" y="120" width="200" height="280" rx="14" fill="#281204" stroke="#ffd166" stroke-width="8"/>
  <text x="280" y="185" font-size="40" font-weight="800" fill="#ffd166" text-anchor="middle">BEAR</text>
  <text x="280" y="300" font-size="90" text-anchor="middle">🐻</text>
  <circle cx="352" cy="270" r="9" fill="#ffd166"/>
  <rect x="580" y="120" width="200" height="280" rx="14" fill="#281204" stroke="#ff6b81" stroke-width="8"/>
  <text x="680" y="185" font-size="40" font-weight="800" fill="#ff6b81" text-anchor="middle">BARE</text>
  <text x="680" y="300" font-size="90" text-anchor="middle">🧦</text>
  <circle cx="752" cy="270" r="9" fill="#ff6b81"/>
  <!-- confused guest between the doors -->
  <text x="480" y="330" font-size="80" text-anchor="middle">🧳</text>
  <text x="480" y="230" font-size="56" font-weight="800" fill="#fff6ea" text-anchor="middle">?</text>
  <!-- front desk bell -->
  <text x="90 " y="460" font-size="56">🛎️</text>
  <text x="870" y="460" font-size="56" text-anchor="end">⚖️</text>
  <text x="480" y="490" fill="url(#ttl)" font-size="62" font-weight="800" text-anchor="middle">Homophone Hotel</text>
</svg>
