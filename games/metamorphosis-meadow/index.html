<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Metamorphosis Meadow — OnlyGrins</title>

<script src="/sdk/arcade-sdk.js"></script>
<script src="edu-sdk.js"></script>
<script src="bgm.js" data-cat="science" data-seed="metamorphosis-meadow"></script>

<style>
  :root{
    --bg1:#123a35; --bg2:#1c5a4a; --bg3:#0b241f;
    --card:#154438; --line:#3f9a7a; --text:#eafff6; --muted:#a9e0cf;
    --green:#7bf0b0; --blue:#6ec8ff; --purple:#c77dff; --pink:#ff9ec7; --gold:#ffd15a; --bad:#ff6b81;
  }
  *{box-sizing:border-box;} html,body{margin:0;height:100%;}
  body{background:linear-gradient(135deg,var(--bg1),var(--bg2) 50%,var(--bg3));
    color:var(--text);font:16px/1.45 "Baloo 2","Comic Sans MS",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100%;padding:16px;
    user-select:none;-webkit-user-select:none;}
  .wrap{width:min(960px,100%);}
  .card{background:var(--card);border:2px solid var(--line);border-radius:22px;
    padding:20px 26px;box-shadow:0 18px 50px rgba(0,0,0,.5);}
  h1{margin:0 0 4px;font-size:clamp(24px,4.5vw,40px);font-weight:800;text-align:center;
    background:linear-gradient(90deg,var(--pink),var(--green),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);text-align:center;margin:0 0 16px;}
  .grades{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
  .gradeBtn{cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:17px;
    padding:14px 20px;border-radius:16px;color:#0b241f;box-shadow:0 6px 0 rgba(0,0,0,.35);}
  .gradeBtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.35);}
  .g1{background:var(--green);} .g2{background:var(--blue);} .g3{background:var(--purple);}
  .gradeBtn small{display:block;font-weight:700;font-size:12px;opacity:.75;}

  .top{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-weight:800;}
  .top .round{color:var(--blue);} .top .spacer{flex:1;}
  .top .score{color:var(--green);font-size:20px;}
  .name{text-align:center;font-size:clamp(18px,3.4vw,24px);font-weight:800;margin:4px 0 12px;}
  .name b{color:var(--gold);}
  .slots{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
  .slot{width:clamp(64px,15vw,96px);height:clamp(78px,17vw,112px);border-radius:14px;border:2px dashed var(--line);
    background:#0e352c;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
  .slot .n{position:absolute;top:4px;left:8px;font-size:12px;color:var(--muted);font-weight:800;}
  .slot .e{font-size:clamp(26px,6vw,38px);} .slot .l{font-size:11px;color:var(--muted);margin-top:2px;text-align:center;padding:0 2px;}
  .slot.filled{border-style:solid;background:#12463a;}
  .slot.ok{border-color:var(--green);box-shadow:0 0 0 2px var(--green) inset;}
  .slot.no{border-color:var(--bad);box-shadow:0 0 0 2px var(--bad) inset;}
  .pool{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;min-height:100px;}
  .pcard{cursor:pointer;width:clamp(64px,15vw,96px);border-radius:14px;border:2px solid var(--line);
    background:#1c5a4a;box-shadow:0 5px 0 rgba(0,0,0,.35);padding:8px 4px;text-align:center;transition:.1s;}
  .pcard:active{transform:translateY(2px);} .pcard .e{font-size:clamp(26px,6vw,38px);}
  .pcard .l{font-size:12px;color:var(--text);font-weight:700;}
  .pcard.used{opacity:.25;pointer-events:none;}
  .runbar{display:flex;gap:10px;justify-content:center;margin-top:14px;}
  .btn{cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:15px;
    padding:10px 18px;border-radius:12px;color:#0b241f;background:#3f9a7a;box-shadow:0 4px 0 rgba(0,0,0,.35);}
  .btn:active{transform:translateY(2px);} .btn:disabled{opacity:.4;}
  .toast{min-height:24px;text-align:center;font-weight:800;font-size:16px;margin-top:12px;}
  .toast.good{color:var(--green);} .toast.bad{color:var(--bad);}
  .shake{animation:shake .45s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
  .final{text-align:center;padding:12px 0;}
  .final .big{font-size:58px;font-weight:800;color:var(--green);margin:8px 0;}
  .final p{color:var(--muted);margin:6px 0;} .final .pb{color:var(--green);font-weight:800;}
  .actions{display:flex;justify-content:center;gap:12px;}
  .hidden{display:none!important;}
  .sdknote{margin-top:12px;text-align:center;font:12px ui-monospace,Consolas,monospace;color:#6cae94;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">

    <div id="start">
      <h1>🦋 Metamorphosis Meadow</h1>
      <p class="sub">The life cycles got jumbled! Tap the stage cards <b>in order</b> — from the very start
        to the grown-up adult. Butterflies, frogs, plants, ladybugs and more.</p>
      <div class="grades">
        <button class="gradeBtn g1" data-grade="0">Grade 1–2<small>short, familiar cycles</small></button>
        <button class="gradeBtn g2" data-grade="1">Grade 3<small>plants &amp; minibeasts</small></button>
        <button class="gradeBtn g3" data-grade="2">Grade 4–5<small>longer, trickier cycles</small></button>
      </div>
      <p class="sub">8 cycles per run · first-try orders earn streak bonuses</p>
    </div>

    <div id="game" class="hidden">
      <div class="top">
        <span class="round" id="roundLbl">Cycle 1/8</span>
        <span class="spacer"></span>
        <span class="score">⭐ <span id="scoreVal">0</span></span>
      </div>
      <div class="name" id="name"></div>
      <div class="slots" id="slots"></div>
      <div class="pool" id="pool"></div>
      <div class="runbar">
        <button class="btn" id="undoBtn">⌫ Undo</button>
        <button class="btn" id="resetBtn">↺ Reset</button>
      </div>
      <div class="toast" id="toast"></div>
    </div>

    <div id="final" class="hidden final">
      <div style="font-size:76px" id="finalEmoji">🦋</div>
      <p id="finalLine"></p>
      <div class="big" id="finalScore">0</div>
      <p id="saveMsg">Saving your score…</p>
      <div class="actions">
        <button class="gradeBtn g1" id="againBtn">New meadow ▸</button>
        <button class="gradeBtn g2" id="changeBtn">Change grade</button>
      </div>
    </div>

    <div class="sdknote" id="sdknote"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  function C(n, stages){ return { n:n, stages:stages }; }
  var POOLS = [
    [ // Grade 1-2 : short & familiar
      C('a Frog',      [['Frog eggs','🥚'],['Tadpole','🐟'],['Frog','🐸']]),
      C('a Chicken',   [['Egg','🥚'],['Chick','🐤'],['Hen','🐔']]),
      C('a Sunflower', [['Seed','🌰'],['Sprout','🌱'],['Bud','🌿'],['Flower','🌻']]),
      C('a Butterfly', [['Egg','🥚'],['Caterpillar','🐛'],['Chrysalis','🟢'],['Butterfly','🦋']])
    ],
    [ // Grade 3 : plants & minibeasts
      C('a Bean Plant',[['Seed','🌰'],['Sprout','🌱'],['Seedling','🪴'],['Flower','🌸'],['Bean pod','🫛']]),
      C('a Ladybug',   [['Egg','🥚'],['Larva','🐛'],['Pupa','🟠'],['Ladybug','🐞']]),
      C('an Apple Tree',[['Seed','🌰'],['Sprout','🌱'],['Tree','🌳'],['Blossom','🌸'],['Apple','🍎']]),
      C('a Pumpkin',   [['Seed','🌰'],['Sprout','🌱'],['Vine','🌿'],['Flower','🌼'],['Pumpkin','🎃']])
    ],
    [ // Grade 4-5 : longer & trickier
      C('a Human',     [['Baby','👶'],['Child','🧒'],['Teen','🧑'],['Adult','🧔'],['Elder','🧓']]),
      C('a Bee',       [['Egg','🥚'],['Larva','🐛'],['Pupa','🟡'],['Bee','🐝']]),
      C('a Salmon',    [['Eggs','🥚'],['Fry','🐟'],['Young','🐠'],['Adult','🐡']]),
      C('an Oak Tree', [['Acorn','🌰'],['Sprout','🌱'],['Sapling','🌿'],['Oak tree','🌳']]),
      C('a Frog (full)',[['Frog eggs','🥚'],['Tadpole','🐟'],['Froglet','🐸'],['Adult frog','🐸']])
    ]
  ];
  var GRADES = [ { id:1, label:'Grade 1–2' }, { id:3, label:'Grade 3' }, { id:4, label:'Grade 4–5' } ];
  var ROUNDS = 8;

  var CHEER = ['Perfect order — life finds a way! 🦋🎉','Grew it right, start to finish! 🌟','Spot-on sequence! 💚','Meadow master! ✨'];
  var OOPS  = ['Not quite the right order. 🌱','Some stages are out of place! 🤔','Check what comes first — try the next!'];

  var gradeIdx = 0, q = 0, score = 0, streak = 0, nRight = 0;
  var round = null, placed = [], locked = false;

  var $ = function (id){ return document.getElementById(id); };
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

  var AC = window.AudioContext || window.webkitAudioContext, actx = null;
  function tone(f,d,t,slide){ try{ actx=actx||new AC(); var o=actx.createOscillator(),g=actx.createGain();
    o.type=t||'sine'; o.frequency.value=f; if(slide)o.frequency.exponentialRampToValueAtTime(slide,actx.currentTime+d);
    g.gain.setValueAtTime(.08,actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+d);}catch(e){} }
  function place(){ tone(560,.05,'sine',720); }
  function good(){ tone(523,.1,'sine'); setTimeout(function(){ tone(784,.18,'sine',1046); },110); }
  function bad(){ tone(200,.3,'sawtooth',90); }

  function render() {
    locked = false; placed = [];
    var cyc = pick(POOLS[gradeIdx]);
    // display order: shuffled stage indices; each card knows its correct position
    var order = cyc.stages.map(function (_, i) { return i; });
    shuffle(order);
    round = { cyc: cyc, display: order };
    $('roundLbl').textContent = 'Cycle ' + (q + 1) + '/' + ROUNDS;
    $('name').innerHTML = 'Put <b>' + cyc.n + '</b> in order — first to last';
    $('toast').textContent = ''; $('toast').className = 'toast';
    drawSlots(); drawPool();
    EduSDK.startLesson(q + 1, { cycle: cyc.n });
  }

  function drawSlots() {
    var s = $('slots'); s.innerHTML = '';
    round.cyc.stages.forEach(function (_, i) {
      var d = document.createElement('div');
      d.className = 'slot' + (placed[i] !== undefined ? ' filled' : '');
      var content = '<span class="n">' + (i + 1) + '</span>';
      if (placed[i] !== undefined) {
        var st = round.cyc.stages[placed[i]];
        content += '<span class="e">' + st[1] + '</span><span class="l">' + st[0] + '</span>';
      }
      d.innerHTML = content;
      s.appendChild(d);
    });
  }

  function drawPool() {
    var p = $('pool'); p.innerHTML = '';
    round.display.forEach(function (stageIdx) {
      var st = round.cyc.stages[stageIdx];
      var used = placed.indexOf(stageIdx) !== -1;
      var c = document.createElement('div');
      c.className = 'pcard' + (used ? ' used' : '');
      c.innerHTML = '<div class="e">' + st[1] + '</div><div class="l">' + st[0] + '</div>';
      c.addEventListener('click', function () { placeCard(stageIdx); });
      p.appendChild(c);
    });
  }

  function placeCard(stageIdx) {
    if (locked) return;
    if (placed.indexOf(stageIdx) !== -1) return;
    placed.push(stageIdx); place();
    drawSlots(); drawPool();
    if (placed.length === round.cyc.stages.length) evaluate();
  }

  function evaluate() {
    locked = true;
    var slots = $('slots').children, allRight = true;
    placed.forEach(function (stageIdx, pos) {
      var ok = stageIdx === pos;
      slots[pos].classList.add(ok ? 'ok' : 'no');
      if (!ok) allRight = false;
    });
    if (allRight) {
      good(); nRight++; streak++;
      var pts = 100 + streak * 15; score += pts; $('scoreVal').textContent = score;
      $('toast').textContent = pick(CHEER) + '  +' + pts; $('toast').className = 'toast good';
    } else {
      bad(); streak = 0;
      $('card').classList.add('shake'); setTimeout(function(){ $('card').classList.remove('shake'); }, 500);
      // reveal correct order
      setTimeout(function () {
        placed = round.cyc.stages.map(function (_, i) { return i; });
        drawSlots();
        var sl = $('slots').children;
        for (var i = 0; i < sl.length; i++) sl[i].classList.add('ok');
      }, 700);
      $('toast').textContent = pick(OOPS) + ' Here\'s the right order:'; $('toast').className = 'toast bad';
      var _pen = EduSDK.applyPenalty(score, parseInt(GRADES[gradeIdx].id, 10)); score = _pen.score; $('scoreVal').textContent = score; // wrong → −20 (Grade 3+), floored at 0
      if (_pen.delta) $('toast').textContent += '  ' + _pen.delta; // show the −20
    }
    EduSDK.finishLesson(q + 1, { correct: allRight });
    next();
  }

  function next() {
    q++;
    if (q >= ROUNDS) return setTimeout(finish, 2000);
    if (q === Math.floor(ROUNDS / 2)) setTimeout(function(){ EduSDK.adBreak('interlevel').then(render); }, 2000);
    else setTimeout(render, 2000);
  }

  function finish() {
    $('game').classList.add('hidden'); $('final').classList.remove('hidden');
    $('finalScore').textContent = score;
    $('finalEmoji').textContent = nRight >= 7 ? '🦋🏆' : nRight >= 4 ? '🦋🌻' : '🦋🌱';
    $('finalLine').textContent = GRADES[gradeIdx].label + ' — ' + nRight + '/' + ROUNDS + ' cycles ordered right. ' +
      (nRight >= 7 ? 'Master naturalist — every life cycle in perfect order!' :
       nRight >= 4 ? 'Great growing — a few stages got shuffled.' :
       'Keep watching things grow — start small, finish grown-up!');
    EduSDK.submitScore(score, { grade: GRADES[gradeIdx].id, right: nRight })
      .then(function (res) {
        var el = $('saveMsg');
        if (res && res.success) el.innerHTML = res.isPersonalBest
          ? '<span class="pb">🏆 New personal best — on the leaderboard!</span>' : 'Score saved to the leaderboard.';
        else if (res && res.offline) el.textContent = 'Standalone mode — play on OnlyGrins to earn GP!';
        else el.textContent = (res && res.error === 'not_authenticated') ? 'Sign in on OnlyGrins to save your score.' : 'Could not save score.';
      })
      .then(function () { return EduSDK.end({ score: score }); });
  }

  function startGame(idx) {
    gradeIdx = idx; q = 0; score = 0; streak = 0; nRight = 0;
    $('scoreVal').textContent = '0';
    $('start').classList.add('hidden'); $('final').classList.add('hidden');
    $('game').classList.remove('hidden');
    render();
  }

  Array.prototype.forEach.call(document.querySelectorAll('#start .gradeBtn'), function (b) {
    b.addEventListener('click', function () { startGame(Number(b.dataset.grade)); });
  });
  $('undoBtn').addEventListener('click', function () { if (!locked && placed.length) { placed.pop(); drawSlots(); drawPool(); } });
  $('resetBtn').addEventListener('click', function () { if (!locked) { placed = []; drawSlots(); drawPool(); } });
  $('againBtn').addEventListener('click', function () { startGame(gradeIdx); });
  $('changeBtn').addEventListener('click', function () {
    $('final').classList.add('hidden'); $('start').classList.remove('hidden');
  });

  $('sdknote').textContent = EduSDK.isHosted() ? 'SDK: connected' : 'SDK: standalone (scoring no-ops)';
  EduSDK.begin({ game: 'metamorphosis-meadow' });
})();
</script>
</body>
</html>
