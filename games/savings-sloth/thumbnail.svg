<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2a26"/><stop offset=".5" stop-color="#123a34"/><stop offset="1" stop-color="#08201d"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
    <linearGradient id="jarfill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- branch -->
  <path d="M 60 150 Q 300 120 520 150" stroke="#5a3d20" stroke-width="16" fill="none" stroke-linecap="round"/>
  <text x="120" y="130" font-size="40">🍃</text><text x="300" y="120" font-size="40">🍃</text>
  <!-- hanging sloth -->
  <text x="250" y="290" font-size="130" text-anchor="middle">🦥</text>
  <!-- savings jar -->
  <g>
    <rect x="600" y="180" width="200" height="240" rx="24" fill="#08241f" stroke="#ffd54a" stroke-width="8"/>
    <rect x="612" y="300" width="176" height="108" rx="14" fill="url(#jarfill)"/>
    <rect x="660" y="160" width="80" height="30" rx="8" fill="#ffd54a"/>
    <text x="700" y="270" font-size="40" text-anchor="middle">🪙</text>
    <text x="700" y="380" font-size="30" font-weight="800" fill="#04231d" text-anchor="middle">$40</text>
  </g>
  <!-- goal -->
  <text x="860" y="150" font-size="60" text-anchor="middle">🛹</text>
  <text x="480" y="500" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Savings Sloth</text>
</svg>
