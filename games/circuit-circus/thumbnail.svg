<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e0a10"/><stop offset=".5" stop-color="#401218"/><stop offset="1" stop-color="#160408"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd166"/><stop offset=".5" stop-color="#ff6b81"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- big top silhouette -->
  <path d="M180 200 L480 60 L780 200 Z" fill="#401218" stroke="#ffd166" stroke-width="8"/>
  <path d="M420 60 L480 20 L540 60" fill="none" stroke="#ffd166" stroke-width="8"/>
  <!-- circuit loop -->
  <g font-size="56" font-weight="800">
    <rect x="200" y="260" width="560" height="150" rx="20" fill="none" stroke="#5ad8ff" stroke-width="8" stroke-dasharray="26 16"/>
    <text x="200" y="355" text-anchor="middle">🔋</text>
    <text x="480" y="250" text-anchor="middle">💡</text>
    <text x="760" y="355" text-anchor="middle">🥄</text>
    <text x="480" y="420" text-anchor="middle" font-size="40" fill="#ffd166">will it light?</text>
  </g>
  <!-- trapeze artist dangling -->
  <line x1="850" y1="60" x2="850" y2="170" stroke="#e0a8b0" stroke-width="5"/>
  <text x="850" y="215" font-size="56" text-anchor="middle">🤸</text>
  <!-- clown in the dark -->
  <text x="110" y="420" font-size="70" text-anchor="middle">🤡</text>
  <text x="480" y="500" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Circuit Circus</text>
</svg>
