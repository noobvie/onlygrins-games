<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1d0c"/><stop offset=".5" stop-color="#3a2a12"/><stop offset="1" stop-color="#201608"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- sun -->
  <circle cx="850" cy="90" r="46" fill="#ffb84d" opacity=".9"/>
  <!-- polaroid photos -->
  <g>
    <rect x="90" y="120" width="220" height="250" rx="10" fill="#fff" transform="rotate(-8 200 245)"/>
    <text x="185" y="250" font-size="110" text-anchor="middle" transform="rotate(-8 200 245)">🗼</text>
    <text x="188" y="330" font-size="26" font-weight="800" fill="#453317" text-anchor="middle" transform="rotate(-8 200 245)">France?</text>
  </g>
  <g>
    <rect x="370" y="90" width="220" height="250" rx="10" fill="#fff" transform="rotate(4 480 215)"/>
    <text x="478" y="220" font-size="110" text-anchor="middle" transform="rotate(4 480 215)">🗽</text>
    <text x="480" y="300" font-size="26" font-weight="800" fill="#453317" text-anchor="middle" transform="rotate(4 480 215)">USA?</text>
  </g>
  <g>
    <rect x="650" y="140" width="220" height="250" rx="10" fill="#fff" transform="rotate(-4 760 265)"/>
    <text x="755" y="270" font-size="110" text-anchor="middle" transform="rotate(-4 760 265)">🔺</text>
    <text x="758" y="350" font-size="26" font-weight="800" fill="#453317" text-anchor="middle" transform="rotate(-4 760 265)">Egypt?</text>
  </g>
  <!-- photographer + jeep -->
  <text x="80" y="470" font-size="64">📸</text>
  <text x="880" y="470" font-size="64" text-anchor="middle">🚙</text>
  <text x="480" y="500" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Landmark Safari</text>
</svg>
