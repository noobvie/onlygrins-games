<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Push-Pull Pandas — OnlyGrins</title>

<script src="/sdk/arcade-sdk.js"></script>
<script src="edu-sdk.js"></script>
<script src="bgm.js" data-cat="science" data-seed="push-pull-pandas"></script>

<style>
  :root{
    --bg1:#12331f; --bg2:#1c4a2c; --bg3:#0b2013;
    --card:#153a24; --line:#3f7a52; --text:#eafff0; --muted:#a9d9bb;
    --green:#7bf0a8; --blue:#6ec8ff; --purple:#c77dff; --gold:#ffd15a; --bad:#ff6b81; --track:#0d2916;
  }
  *{box-sizing:border-box;} html,body{margin:0;height:100%;}
  body{background:linear-gradient(135deg,var(--bg1),var(--bg2) 50%,var(--bg3));
    color:var(--text);font:16px/1.45 "Baloo 2","Comic Sans MS",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100%;padding:16px;
    user-select:none;-webkit-user-select:none;}
  .wrap{width:min(960px,100%);}
  .card{background:var(--card);border:2px solid var(--line);border-radius:22px;
    padding:20px 26px;box-shadow:0 18px 50px rgba(0,0,0,.5);}
  h1{margin:0 0 4px;font-size:clamp(24px,4.5vw,40px);font-weight:800;text-align:center;
    background:linear-gradient(90deg,var(--gold),var(--green),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);text-align:center;margin:0 0 16px;}
  .grades{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
  .gradeBtn{cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:17px;
    padding:14px 20px;border-radius:16px;color:#0b2013;box-shadow:0 6px 0 rgba(0,0,0,.35);}
  .gradeBtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.35);}
  .g1{background:var(--green);} .g2{background:var(--blue);} .g3{background:var(--purple);}
  .gradeBtn small{display:block;font-weight:700;font-size:12px;opacity:.75;}

  .top{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-weight:800;}
  .top .round{color:var(--blue);} .top .spacer{flex:1;}
  .top .score{color:var(--green);font-size:20px;}
  .surface{text-align:center;font-size:clamp(17px,3.2vw,22px);font-weight:800;margin:6px 0 10px;}
  .surface b{color:var(--gold);}
  .track{display:flex;gap:3px;background:var(--track);padding:8px;border-radius:14px;border:2px solid var(--line);overflow-x:auto;}
  .sq{min-width:clamp(34px,7vw,50px);height:clamp(44px,9vw,58px);border-radius:8px;background:#1a4029;
    display:flex;align-items:flex-end;justify-content:center;font-size:26px;position:relative;flex:1;}
  .sq .base{position:absolute;bottom:2px;font-size:11px;color:#5f9a72;font-weight:800;}
  .sq.target{background:#3a5a1e;box-shadow:0 0 0 3px var(--gold) inset;}
  .sq .panda{font-size:30px;transition:none;}
  .pushbar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
  .pbtn{cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:16px;
    padding:12px 18px;border-radius:14px;color:#0b2013;background:var(--blue);box-shadow:0 5px 0 rgba(0,0,0,.35);}
  .pbtn:active{transform:translateY(3px);} .pbtn:disabled{opacity:.4;cursor:default;}
  .pbtn small{display:block;font-size:11px;opacity:.7;font-weight:700;}
  .toast{min-height:24px;text-align:center;font-weight:800;font-size:16px;margin-top:12px;}
  .toast.good{color:var(--green);} .toast.bad{color:var(--bad);}
  .shake{animation:shake .45s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
  .final{text-align:center;padding:12px 0;}
  .final .big{font-size:58px;font-weight:800;color:var(--green);margin:8px 0;}
  .final p{color:var(--muted);margin:6px 0;} .final .pb{color:var(--green);font-weight:800;}
  .actions{display:flex;justify-content:center;gap:12px;}
  .hidden{display:none!important;}
  .sdknote{margin-top:12px;text-align:center;font:12px ui-monospace,Consolas,monospace;color:#6fae86;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">

    <div id="start">
      <h1>🐼 Push-Pull Pandas</h1>
      <p class="sub">Slide Pip the panda so he stops right on the flag! Read the surface — slippery ice keeps
        him going, rough gravel stops him fast. Pick a push so <b>push − friction</b> lands him on target.</p>
      <div class="grades">
        <button class="gradeBtn g1" data-grade="0">Grade 1–2<small>smooth, exact spot</small></button>
        <button class="gradeBtn g2" data-grade="1">Grade 3<small>grippier surfaces</small></button>
        <button class="gradeBtn g3" data-grade="2">Grade 4–5<small>gravel &amp; wind 💨</small></button>
      </div>
      <p class="sub">8 slides per run · perfect landings earn streak bonuses</p>
    </div>

    <div id="game" class="hidden">
      <div class="top">
        <span class="round" id="roundLbl">Slide 1/8</span>
        <span class="spacer"></span>
        <span class="score">⭐ <span id="scoreVal">0</span></span>
      </div>
      <div class="surface" id="surface"></div>
      <div class="track" id="track"></div>
      <div class="pushbar" id="pushbar"></div>
      <div class="toast" id="toast"></div>
    </div>

    <div id="final" class="hidden final">
      <div style="font-size:76px" id="finalEmoji">🐼</div>
      <p id="finalLine"></p>
      <div class="big" id="finalScore">0</div>
      <p id="saveMsg">Saving your score…</p>
      <div class="actions">
        <button class="gradeBtn g1" id="againBtn">New slides ▸</button>
        <button class="gradeBtn g2" id="changeBtn">Change grade</button>
      </div>
    </div>

    <div class="sdknote" id="sdknote"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var SURFACES = [
    { n:'Ice',    e:'🧊', f:0 }, { n:'Wood',   e:'🟫', f:1 },
    { n:'Grass',  e:'🌿', f:2 }, { n:'Carpet', e:'🟥', f:2 },
    { n:'Sand',   e:'🏖️', f:3 }, { n:'Gravel', e:'🪨', f:3 }
  ];
  var GRADES = [
    { id: 1, label: 'Grade 1–2', cells: 10, zone: 0, maxFric: 1, wind: false, pushes: [{l:'Soft 🐾',v:4},{l:'Medium 👟',v:6},{l:'Hard 💥',v:8}] },
    { id: 3, label: 'Grade 3',   cells: 12, zone: 0, maxFric: 2, wind: false, pushes: [{l:'Soft 🐾',v:5},{l:'Medium 👟',v:7},{l:'Hard 💥',v:9},{l:'Mega 🚀',v:11}] },
    { id: 4, label: 'Grade 4–5', cells: 13, zone: 0, maxFric: 3, wind: true,  pushes: [{l:'Soft 🐾',v:5},{l:'Medium 👟',v:7},{l:'Hard 💥',v:9},{l:'Mega 🚀',v:11}] }
  ];
  var ROUNDS = 8;

  var CHEER = ['Perfect slide — right on the flag! 🐼🎉','Nailed the force! 🌟','Friction? Solved. 💚','Panda physics champ! ✨'];
  var SHORT = ['Stopped short — friction won that time. 😅','Not enough push for that surface! 🤔'];
  var LONG  = ['Zoomed right past — too much push! 😆','Overshot the flag! 🚀'];

  var grade = GRADES[0], q = 0, score = 0, streak = 0, nRight = 0;
  var round = null, locked = false;

  var $ = function (id){ return document.getElementById(id); };
  function rint(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

  var AC = window.AudioContext || window.webkitAudioContext, actx = null;
  function tone(f,d,t,slide){ try{ actx=actx||new AC(); var o=actx.createOscillator(),g=actx.createGain();
    o.type=t||'sine'; o.frequency.value=f; if(slide)o.frequency.exponentialRampToValueAtTime(slide,actx.currentTime+d);
    g.gain.setValueAtTime(.07,actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+d);}catch(e){} }
  function slidefx(){ tone(300,.12,'sawtooth',180); }
  function good(){ tone(523,.1,'sine'); setTimeout(function(){ tone(784,.18,'sine',1046); },110); }
  function bad(){ tone(200,.3,'sawtooth',90); }

  function buildRound() {
    // Retry until some push lands EXACTLY on an in-range target (guarantees solvable).
    for (var i = 0; i < 120; i++) {
      var surf = pick(SURFACES.filter(function(s){ return s.f <= grade.maxFric; }));
      var wind = grade.wind ? pick([-1, 0, 0, 1]) : 0;
      var p = pick(grade.pushes);
      var land = p.v - surf.f + wind;
      if (land >= 2 && land <= grade.cells - 1) return { surf: surf, wind: wind, target: land };
    }
    return { surf: SURFACES[0], wind: 0, target: 4 }; // ice, friction 0 → Soft push (4) lands on 4
  }

  function drawTrack(pandaCell) {
    var t = $('track'); t.innerHTML = '';
    for (var i = 0; i < grade.cells; i++) {
      var d = document.createElement('div');
      d.className = 'sq' + (i === round.target ? ' target' : '');
      var inner = '';
      if (i === round.target) inner += '🚩';
      if (i === pandaCell) inner = '<span class="panda">🐼</span>';
      d.innerHTML = inner + '<span class="base">' + i + '</span>';
      t.appendChild(d);
    }
  }

  function render() {
    locked = false;
    round = buildRound();
    $('roundLbl').textContent = 'Slide ' + (q + 1) + '/' + ROUNDS;
    var windTxt = round.wind ? ' &nbsp; 💨 wind <b>' + (round.wind > 0 ? '+' + round.wind : round.wind) + '</b>' : '';
    $('surface').innerHTML = 'Surface: <b>' + round.surf.e + ' ' + round.surf.n + '</b> (friction <b>' + round.surf.f + '</b>)' + windTxt;
    $('toast').textContent = ''; $('toast').className = 'toast';
    drawTrack(0);
    var bar = $('pushbar'); bar.innerHTML = '';
    grade.pushes.forEach(function (p) {
      var b = document.createElement('button');
      b.className = 'pbtn';
      b.innerHTML = p.l + '<small>force ' + p.v + '</small>';
      b.addEventListener('click', function () { launch(p); });
      bar.appendChild(b);
    });
    EduSDK.startLesson(q + 1, {});
  }

  function launch(p) {
    if (locked) return;
    locked = true;
    Array.prototype.forEach.call($('pushbar').children, function(b){ b.disabled = true; });
    var land = Math.max(0, Math.min(grade.cells - 1, p.v - round.surf.f + round.wind));
    slidefx();
    var cell = 0;
    var timer = setInterval(function () {
      if (cell >= land) { clearInterval(timer); settle(land); return; }
      cell++; drawTrack(cell);
    }, 110);
  }

  function settle(land) {
    var hit = land === round.target;
    if (hit) {
      good(); nRight++; streak++;
      var pts = 100 + streak * 15; score += pts; $('scoreVal').textContent = score;
      $('toast').textContent = pick(CHEER) + '  +' + pts; $('toast').className = 'toast good';
    } else {
      bad(); streak = 0;
      $('card').classList.add('shake'); setTimeout(function(){ $('card').classList.remove('shake'); }, 500);
      $('toast').textContent = (land < round.target ? pick(SHORT) : pick(LONG)) +
        ' Needed force ' + (round.target + round.surf.f - round.wind) + '.';
      $('toast').className = 'toast bad';
    }
    EduSDK.finishLesson(q + 1, { hit: hit });
    next();
  }

  function next() {
    q++;
    if (q >= ROUNDS) return setTimeout(finish, 1700);
    if (q === Math.floor(ROUNDS / 2)) setTimeout(function(){ EduSDK.adBreak('interlevel').then(render); }, 1700);
    else setTimeout(render, 1700);
  }

  function finish() {
    $('game').classList.add('hidden'); $('final').classList.remove('hidden');
    $('finalScore').textContent = score;
    $('finalEmoji').textContent = nRight >= 7 ? '🐼🏆' : nRight >= 4 ? '🐼🚩' : '🐼🎍';
    $('finalLine').textContent = grade.label + ' — ' + nRight + '/' + ROUNDS + ' perfect landings. ' +
      (nRight >= 7 ? 'Master of forces — friction never fooled you!' :
       nRight >= 4 ? 'Solid physics — a few slides over- or under-shot.' :
       'Remember: rougher surface needs a bigger push. Try again!');
    EduSDK.submitScore(score, { grade: grade.id, right: nRight })
      .then(function (res) {
        var el = $('saveMsg');
        if (res && res.success) el.innerHTML = res.isPersonalBest
          ? '<span class="pb">🏆 New personal best — on the leaderboard!</span>' : 'Score saved to the leaderboard.';
        else if (res && res.offline) el.textContent = 'Standalone mode — play on OnlyGrins to earn GP!';
        else el.textContent = (res && res.error === 'not_authenticated') ? 'Sign in on OnlyGrins to save your score.' : 'Could not save score.';
      })
      .then(function () { return EduSDK.end({ score: score }); });
  }

  function startGame(g) {
    grade = g; q = 0; score = 0; streak = 0; nRight = 0;
    $('scoreVal').textContent = '0';
    $('start').classList.add('hidden'); $('final').classList.add('hidden');
    $('game').classList.remove('hidden');
    render();
  }

  Array.prototype.forEach.call(document.querySelectorAll('#start .gradeBtn'), function (b) {
    b.addEventListener('click', function () { startGame(GRADES[Number(b.dataset.grade)]); });
  });
  $('againBtn').addEventListener('click', function () { startGame(grade); });
  $('changeBtn').addEventListener('click', function () {
    $('final').classList.add('hidden'); $('start').classList.remove('hidden');
  });

  $('sdknote').textContent = EduSDK.isHosted() ? 'SDK: connected' : 'SDK: standalone (scoring no-ops)';
  EduSDK.begin({ game: 'push-pull-pandas' });
})();
</script>
</body>
</html>
