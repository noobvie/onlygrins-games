    <path d="M0,0 L46,-26 A52,52 0 1 0 46,26 Z" fill="#5be08a" stroke="#0c3a20" stroke-width="3"/>
    <circle cx="6" cy="-22" r="7" fill="#0c3a20"/><circle cx="8" cy="-24" r="3" fill="#fff"/>
  </g>
  <rect x="0" y="470" width="960" height="70" fill="#04140c" fill-opacity="0.55"/>
  <text x="480" y="60" text-anchor="middle" font-size="58" font-weight="800" fill="url(#title)">🟢 Number Muncher</text>
  <text x="480" y="515" text-anchor="middle" font-size="30" font-weight="700" fill="#9fe6c0">Eat the multiples · factors · primes — dodge the Gremlin!</text>
