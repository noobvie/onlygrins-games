    <path d="M0,-34 L11,-11 L34,-8 L16,8 L20,32 L0,20 L-20,32 L-16,8 L-34,-8 L-11,-11 Z" fill="#ff5b6e" stroke="#7a1420" stroke-width="3"/>
    <circle cx="-8" cy="-4" r="6" fill="#fff"/><circle cx="9" cy="-4" r="6" fill="#fff"/>
    <circle cx="-6" cy="-2" r="3" fill="#2a0008"/><circle cx="11" cy="-2" r="3" fill="#2a0008"/>
  </g>
