<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d3320"/><stop offset="1" stop-color="#04140c"/>
    </linearGradient>
    <radialGradient id="tok" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#cdeede"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd15a"/><stop offset="0.5" stop-color="#5be08a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <g stroke="#ffffff" stroke-opacity="0.05">
    <path d="M0 108H960M0 216H960M0 324H960M0 432H960"/>
    <path d="M120 0V540M240 0V540M360 0V540M480 0V540M600 0V540M720 0V540M840 0V540"/>
  </g>
  <!-- number tokens -->
  <g font-weight="800" font-size="30" fill="#0c3a20" text-anchor="middle">
    <circle cx="230" cy="150" r="34" fill="url(#tok)"/><text x="230" y="161">12</text>
    <circle cx="720" cy="130" r="34" fill="url(#tok)"/><text x="720" y="141">7</text>
    <circle cx="800" cy="330" r="34" fill="url(#tok)"/><text x="800" y="341">24</text>
    <circle cx="180" cy="380" r="34" fill="url(#tok)"/><text x="180" y="391">15</text>
    <circle cx="640" cy="410" r="34" fill="url(#tok)"/><text x="640" y="421">36</text>
  </g>
  <!-- gremlin -->
