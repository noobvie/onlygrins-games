<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#33260c"/><stop offset=".5" stop-color="#4a3812"/><stop offset="1" stop-color="#241a08"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- rulebook -->
  <rect x="440" y="90" width="440" height="300" rx="18" fill="#2b2008" stroke="#ffb84d" stroke-width="5" stroke-dasharray="16 10"/>
  <text x="660" y="140" font-size="24" font-weight="800" fill="#ffb84d" text-anchor="middle">📖 RULEBOOK</text>
  <g font-size="28" font-weight="800">
    <text x="470" y="200" fill="#5ad8ff">IF 🦴 <tspan fill="#e8d08a">→</tspan> <tspan fill="#3ee87a">🍽️ Eat</tspan></text>
    <text x="470" y="255" fill="#5ad8ff">IF 🎾 <tspan fill="#e8d08a">→</tspan> <tspan fill="#3ee87a">🏃 Chase</tspan></text>
    <text x="470" y="310" fill="#5ad8ff">IF 🐈 <tspan fill="#e8d08a">→</tspan> <tspan fill="#3ee87a">🗣️ Bark</tspan></text>
    <text x="470" y="365" fill="#c77dff">OTHERWISE <tspan fill="#e8d08a">→</tspan> <tspan fill="#3ee87a">💤 Nap</tspan></text>
  </g>
  <!-- corgi + what it sees -->
  <text x="200" y="270" font-size="150" text-anchor="middle">🐕</text>
  <rect x="120" y="300" width="160" height="90" rx="14" fill="#54420f" stroke="#a8842e" stroke-width="4"/>
  <text x="200" y="365" font-size="52" text-anchor="middle">🦴</text>
  <text x="200" y="140" font-size="40" text-anchor="middle">💭</text>
  <text x="480" y="480" fill="url(#ttl)" font-size="60" font-weight="800" text-anchor="middle">Conditional Corgis</text>
</svg>
