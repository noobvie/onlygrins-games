<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0c2e"/><stop offset=".5" stop-color="#3d1247"/><stop offset="1" stop-color="#1c0820"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- height chart backdrop -->
  <g stroke="#8a3a9a" stroke-width="2" opacity=".5">
    <line x1="80" y1="130" x2="880" y2="130"/><line x1="80" y1="200" x2="880" y2="200"/>
    <line x1="80" y1="270" x2="880" y2="270"/><line x1="80" y1="340" x2="880" y2="340"/>
  </g>
  <!-- mugshots -->
  <g>
    <rect x="150" y="150" width="160" height="210" rx="16" fill="#1c0820" stroke="#8a3a9a" stroke-width="4"/>
    <text x="230" y="250" font-size="72" text-anchor="middle">👾</text>
    <text x="230" y="300" font-size="34" text-anchor="middle">🎩</text>
    <text x="230" y="345" font-size="18" font-weight="800" fill="#e0a8e8" text-anchor="middle">Blorp</text>
    <rect x="400" y="150" width="160" height="210" rx="16" fill="#1c0820" stroke="#8a3a9a" stroke-width="4"/>
    <text x="480" y="250" font-size="72" text-anchor="middle">👹</text>
    <text x="480" y="300" font-size="34" text-anchor="middle">🕶️</text>
    <text x="480" y="345" font-size="18" font-weight="800" fill="#e0a8e8" text-anchor="middle">Gnash</text>
    <rect x="650" y="150" width="160" height="210" rx="16" fill="#1c0820" stroke="#8a3a9a" stroke-width="4"/>
    <text x="730" y="250" font-size="72" text-anchor="middle">🤖</text>
    <text x="730" y="300" font-size="34" text-anchor="middle">☂️</text>
    <text x="730" y="345" font-size="18" font-weight="800" fill="#e0a8e8" text-anchor="middle">Zib</text>
  </g>
  <text x="90" y="250" font-size="60">🕵️</text>
  <text x="480" y="450" fill="url(#ttl)" font-size="60" font-weight="800" text-anchor="middle">Monster Mugshots</text>
  <text x="480" y="495" font-size="22" fill="#e0a8e8" text-anchor="middle">Who wore the hat? Remember!</text>
</svg>
