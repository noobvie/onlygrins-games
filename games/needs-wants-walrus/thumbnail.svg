<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10283f"/><stop offset=".5" stop-color="#1a3c5c"/><stop offset="1" stop-color="#091826"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd15a"/><stop offset=".5" stop-color="#5fe0a0"/><stop offset="1" stop-color="#6ec8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="150" y="130" font-size="60" text-anchor="middle">🦭</text>
  <text x="560" y="95" fill="#eaf6ff" font-size="26" font-weight="800" text-anchor="middle">Wallet: <tspan fill="#ffcf4d">$8</tspan>   Cart: <tspan fill="#5fe0a0">$6</tspan></text>
  <!-- shelf -->
  <g text-anchor="middle">
    <g>
      <rect x="120" y="150" width="150" height="150" rx="16" fill="#12402c" stroke="#5fe0a0" stroke-width="5"/>
      <text x="195" y="215" font-size="46">🍎</text><text x="195" y="255" fill="#eaf6ff" font-size="18" font-weight="800">Food</text><text x="195" y="285" fill="#ffcf4d" font-size="20" font-weight="800">$3</text>
    </g>
    <g>
      <rect x="290" y="150" width="150" height="150" rx="16" fill="#12402c" stroke="#5fe0a0" stroke-width="5"/>
      <text x="365" y="215" font-size="46">💧</text><text x="365" y="255" fill="#eaf6ff" font-size="18" font-weight="800">Water</text><text x="365" y="285" fill="#ffcf4d" font-size="20" font-weight="800">$3</text>
    </g>
    <g>
      <rect x="460" y="150" width="150" height="150" rx="16" fill="#0e2c40" stroke="#3f7aa8" stroke-width="3"/>
      <text x="535" y="215" font-size="46">🧸</text><text x="535" y="255" fill="#a9cfe8" font-size="18" font-weight="800">Toy</text><text x="535" y="285" fill="#ffcf4d" font-size="20" font-weight="800">$4</text>
    </g>
    <g>
      <rect x="630" y="150" width="150" height="150" rx="16" fill="#0e2c40" stroke="#3f7aa8" stroke-width="3"/>
      <text x="705" y="215" font-size="46">🍬</text><text x="705" y="255" fill="#a9cfe8" font-size="18" font-weight="800">Candy</text><text x="705" y="285" fill="#ffcf4d" font-size="20" font-weight="800">$2</text>
    </g>
  </g>
  <text x="480" y="365" fill="#a9cfe8" font-size="24" font-weight="800" text-anchor="middle">Needs first 🛒, then wants — stay on budget!</text>
  <text x="480" y="475" fill="url(#ttl)" font-size="58" font-weight="800" text-anchor="middle">Needs &amp; Wants Walrus</text>
</svg>
