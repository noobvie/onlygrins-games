<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13204a"/><stop offset=".5" stop-color="#1a1140"/><stop offset="1" stop-color="#0c2a3a"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ee87a"/><stop offset=".5" stop-color="#ff8a5c"/><stop offset="1" stop-color="#ff6b81"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- the fiasco: grass chasing the lion -->
  <text x="640" y="220" font-size="120" text-anchor="middle">🦁</text>
  <text x="700" y="130" font-size="34" font-weight="800" fill="#ff6b81" transform="rotate(6 700 130)">RUN!!</text>
  <g font-size="40"><text x="500" y="215">💨</text><text x="545" y="200">💨</text></g>
  <text x="400" y="230" font-size="90" text-anchor="middle">🌱</text>
  <text x="330" y="130" font-size="26" font-weight="800" fill="#3ee87a" transform="rotate(-8 330 130)">GET BACK HERE</text>
  <!-- the correct chain below -->
  <g text-anchor="middle" font-size="54">
    <text x="250" y="390">🌾</text>
    <text x="330" y="380" font-size="30" fill="#3ee87a" font-weight="800">➜</text>
    <text x="410" y="390">🦗</text>
    <text x="490" y="380" font-size="30" fill="#3ee87a" font-weight="800">➜</text>
    <text x="570" y="390">🐸</text>
    <text x="650" y="380" font-size="30" fill="#3ee87a" font-weight="800">➜</text>
    <text x="730" y="390">🐍</text>
  </g>
  <text x="480" y="430" fill="#9fb4e0" font-size="20" font-weight="700" text-anchor="middle">(this is how it is SUPPOSED to go)</text>
  <text x="480" y="500" fill="url(#ttl)" font-size="58" font-weight="800" text-anchor="middle">Food Chain Fiasco</text>
</svg>
