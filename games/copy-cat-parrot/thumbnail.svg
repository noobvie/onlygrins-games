<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c3320"/><stop offset=".5" stop-color="#12472e"/><stop offset="1" stop-color="#082014"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- parrot -->
  <text x="480" y="180" font-size="120" text-anchor="middle">🦜</text>
  <text x="360" y="130" font-size="40">🎶</text>
  <text x="600" y="130" font-size="40">🎶</text>
  <!-- move pads -->
  <g>
    <rect x="180" y="240" width="140" height="140" rx="20" fill="#0a3020" stroke="#2e8a5a" stroke-width="4"/>
    <rect x="340" y="240" width="140" height="140" rx="20" fill="#0a3020" stroke="#2e8a5a" stroke-width="4" filter="brightness(1.5)"/>
    <rect x="340" y="240" width="140" height="140" rx="20" fill="#fff" opacity=".25"/>
    <rect x="500" y="240" width="140" height="140" rx="20" fill="#0a3020" stroke="#2e8a5a" stroke-width="4"/>
    <rect x="660" y="240" width="140" height="140" rx="20" fill="#0a3020" stroke="#2e8a5a" stroke-width="4"/>
    <text x="250" y="330" font-size="60" text-anchor="middle">💃</text>
    <text x="410" y="330" font-size="60" text-anchor="middle">🕺</text>
    <text x="570" y="330" font-size="60" text-anchor="middle">🙌</text>
    <text x="730" y="330" font-size="60" text-anchor="middle">👏</text>
  </g>
  <text x="480" y="460" fill="url(#ttl)" font-size="62" font-weight="800" text-anchor="middle">Copy-Cat Parrot</text>
  <text x="480" y="500" font-size="22" fill="#9fe0c0" text-anchor="middle">Watch · Remember · Copy the dance</text>
</svg>
