<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Burrow Recall — OnlyGrins</title>

<script src="/sdk/arcade-sdk.js"></script>
<script src="edu-sdk.js"></script>
<script src="bgm.js" data-cat="memory" data-seed="burrow-recall"></script>

<style>
  :root{
    --bg1:#22381f; --bg2:#345029; --bg3:#141f10;
    --card:#284220; --line:#5f8a3f; --text:#f0ffe4; --muted:#c4dca0;
    --green:#9be86a; --blue:#6ec8ff; --purple:#c77dff; --gold:#ffd15a; --bad:#ff6b81; --dirt:#7a5230;
  }
  *{box-sizing:border-box;} html,body{margin:0;height:100%;}
  body{background:linear-gradient(135deg,var(--bg1),var(--bg2) 50%,var(--bg3));
    color:var(--text);font:16px/1.45 "Baloo 2","Comic Sans MS",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100%;padding:16px;
    user-select:none;-webkit-user-select:none;}
  .wrap{width:min(960px,100%);}
  .card{background:var(--card);border:2px solid var(--line);border-radius:22px;
    padding:20px 26px;box-shadow:0 18px 50px rgba(0,0,0,.5);}
  h1{margin:0 0 4px;font-size:clamp(24px,4.5vw,40px);font-weight:800;text-align:center;
    background:linear-gradient(90deg,var(--gold),var(--green),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);text-align:center;margin:0 0 16px;}
  .grades{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
  .gradeBtn{cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:17px;
    padding:14px 20px;border-radius:16px;color:#141f10;box-shadow:0 6px 0 rgba(0,0,0,.35);}
  .gradeBtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.35);}
  .g1{background:var(--green);} .g2{background:var(--blue);} .g3{background:var(--purple);}
  .gradeBtn small{display:block;font-weight:700;font-size:12px;opacity:.75;}

  .top{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-weight:800;}
  .top .round{color:var(--blue);} .top .spacer{flex:1;}
  .top .score{color:var(--green);font-size:20px;}
  .status{text-align:center;font-weight:800;font-size:clamp(17px,3.4vw,22px);min-height:28px;margin:6px 0 10px;color:var(--gold);}
  .field{position:relative;height:150px;margin:10px 0;}
  .burrow{position:absolute;top:20px;width:96px;height:104px;cursor:pointer;transition:left .35s ease;
    display:flex;align-items:flex-end;justify-content:center;}
  .mound{width:96px;height:70px;background:radial-gradient(120% 140% at 50% 0,#a9764a,#5f3d22);
    border-radius:50% 50% 44% 44%;position:absolute;bottom:0;box-shadow:0 6px 0 rgba(0,0,0,.35);}
  .hole{width:44px;height:26px;background:#2a1a0e;border-radius:50%;position:absolute;bottom:8px;left:26px;}
  .carrot{position:absolute;bottom:44px;font-size:34px;transition:.2s;opacity:0;}
  .burrow.show .carrot{opacity:1;bottom:70px;}
  .burrow.pickable:hover .mound{outline:3px solid var(--gold);}
  .burrow.right .mound{outline:4px solid var(--green);}
  .burrow.wrong .mound{outline:4px solid var(--bad);}
  .toast{min-height:24px;text-align:center;font-weight:800;font-size:16px;margin-top:6px;}
  .toast.good{color:var(--green);} .toast.bad{color:var(--bad);}
  .final{text-align:center;padding:12px 0;}
  .final .big{font-size:58px;font-weight:800;color:var(--green);margin:8px 0;}
  .final p{color:var(--muted);margin:6px 0;} .final .pb{color:var(--green);font-weight:800;}
  .actions{display:flex;justify-content:center;gap:12px;}
  .hidden{display:none!important;}
  .sdknote{margin-top:12px;text-align:center;font:12px ui-monospace,Consolas,monospace;color:#8fae66;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">

    <div id="start">
      <h1>🐰 Burrow Recall</h1>
      <p class="sub">Watch closely! Bunny hides a <b>🥕 carrot</b> under a burrow, then the burrows shuffle and
        swap places. Keep your eyes on the right one and tap it when they stop.</p>
      <div class="grades">
        <button class="gradeBtn g1" data-grade="0">Grade 1–2<small>3 slow burrows</small></button>
        <button class="gradeBtn g2" data-grade="1">Grade 3<small>4 quicker burrows</small></button>
        <button class="gradeBtn g3" data-grade="2">Grade 4–5<small>5 fast burrows</small></button>
      </div>
      <p class="sub">8 shuffles per run · correct tracking earns streak bonuses</p>
    </div>

    <div id="game" class="hidden">
      <div class="top">
        <span class="round" id="roundLbl">Shuffle 1/8</span>
        <span class="spacer"></span>
        <span class="score">⭐ <span id="scoreVal">0</span></span>
      </div>
      <div class="status" id="status"></div>
      <div class="field" id="field"></div>
      <div class="toast" id="toast"></div>
    </div>

    <div id="final" class="hidden final">
      <div style="font-size:76px" id="finalEmoji">🐰</div>
      <p id="finalLine"></p>
      <div class="big" id="finalScore">0</div>
      <p id="saveMsg">Saving your score…</p>
      <div class="actions">
        <button class="gradeBtn g1" id="againBtn">New shuffles ▸</button>
        <button class="gradeBtn g2" id="changeBtn">Change grade</button>
      </div>
    </div>

    <div class="sdknote" id="sdknote"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var GRADES = [
    { id:1, label:'Grade 1–2', n:3, swaps:3, ms:620 },
    { id:3, label:'Grade 3',   n:4, swaps:6, ms:480 },
    { id:4, label:'Grade 4–5', n:5, swaps:9, ms:360 }
  ];
  var ROUNDS = 8;

  var CHEER = ['You tracked it! 🐰🥕','Sharp eyes! 🌟','Nailed the burrow! 💚','Memory champion bunny! ✨'];
  var OOPS  = ['Lost the carrot! 🥕','Tricky shuffle — not that one. 🤔','So close — next shuffle!'];

  var grade = GRADES[0], q = 0, score = 0, streak = 0, nRight = 0;
  var burrows = [], carrotEl = null, locked = true, cellW = 100;

  var $ = function (id){ return document.getElementById(id); };
  function rint(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

  var AC = window.AudioContext || window.webkitAudioContext, actx = null;
  function tone(f,d,t,slide){ try{ actx=actx||new AC(); var o=actx.createOscillator(),g=actx.createGain();
    o.type=t||'sine'; o.frequency.value=f; if(slide)o.frequency.exponentialRampToValueAtTime(slide,actx.currentTime+d);
    g.gain.setValueAtTime(.06,actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+d);}catch(e){} }
  function whoosh(){ tone(400,.1,'sine',560); }
  function good(){ tone(523,.1,'sine'); setTimeout(function(){ tone(784,.18,'sine',1046); },110); }
  function bad(){ tone(200,.3,'sawtooth',90); }

  function place(el) { el.style.left = (el.slot * cellW) + 'px'; }

  function render() {
    locked = true;
    var field = $('field'); field.innerHTML = '';
    var n = grade.n;
    var fw = field.clientWidth || 560;
    cellW = fw / n;
    burrows = [];
    for (var i = 0; i < n; i++) {
      var b = document.createElement('div');
      b.className = 'burrow'; b.slot = i;
      b.style.width = Math.min(96, cellW - 8) + 'px';
      b.style.left = (i * cellW + (cellW - Math.min(96, cellW - 8)) / 2) + 'px';
      b.innerHTML = '<div class="mound"></div><div class="hole"></div><span class="carrot">🥕</span>';
      (function (el) { el.addEventListener('click', function () { choosePick(el); }); })(b);
      field.appendChild(b); burrows.push(b);
    }
    // recompute placement helper to keep centering
    var offset = (cellW - Math.min(96, cellW - 8)) / 2;
    place = function (el) { el.style.left = (el.slot * cellW + offset) + 'px'; };
    burrows.forEach(place);

    carrotEl = pick(burrows);
    $('roundLbl').textContent = 'Shuffle ' + (q + 1) + '/' + ROUNDS;
    $('toast').textContent = ''; $('toast').className = 'toast';
    $('status').textContent = 'Watch the carrot…';
    carrotEl.classList.add('show');
    EduSDK.startLesson(q + 1, {});
    setTimeout(function () { carrotEl.classList.remove('show'); $('status').textContent = 'Shuffling!'; doSwaps(0); }, 1100);
  }

  function doSwaps(k) {
    if (k >= grade.swaps) { finishShuffle(); return; }
    // pick two distinct slots
    var a = rint(0, grade.n - 1), b;
    do { b = rint(0, grade.n - 1); } while (b === a);
    var elA = burrows.filter(function (x) { return x.slot === a; })[0];
    var elB = burrows.filter(function (x) { return x.slot === b; })[0];
    elA.slot = b; elB.slot = a; place(elA); place(elB); whoosh();
    setTimeout(function () { doSwaps(k + 1); }, grade.ms);
  }

  function finishShuffle() {
    locked = false;
    $('status').textContent = 'Which burrow hides the carrot? Tap it!';
    burrows.forEach(function (b) { b.classList.add('pickable'); });
  }

  function choosePick(el) {
    if (locked) return;
    locked = true;
    burrows.forEach(function (b) { b.classList.remove('pickable'); });
    var correct = el === carrotEl;
    carrotEl.classList.add('show', 'right');
    if (!correct) el.classList.add('wrong');
    if (correct) {
      good(); nRight++; streak++;
      var pts = 100 + streak * 15 + grade.n * 5; score += pts; $('scoreVal').textContent = score;
      $('toast').textContent = pick(CHEER) + '  +' + pts; $('toast').className = 'toast good';
    } else {
      bad(); streak = 0;
      $('card').classList.add('shake'); setTimeout(function(){ $('card').classList.remove('shake'); }, 500);
      $('toast').textContent = pick(OOPS); $('toast').className = 'toast bad';
    }
    EduSDK.finishLesson(q + 1, { correct: correct });
    next();
  }

  function next() {
    q++;
    if (q >= ROUNDS) return setTimeout(finish, 1700);
    if (q === Math.floor(ROUNDS / 2)) setTimeout(function(){ EduSDK.adBreak('interlevel').then(render); }, 1700);
    else setTimeout(render, 1700);
  }

  function finish() {
    $('game').classList.add('hidden'); $('final').classList.remove('hidden');
    $('finalScore').textContent = score;
    $('finalEmoji').textContent = nRight >= 7 ? '🐰🏆' : nRight >= 4 ? '🐰🥕' : '🐰🕳️';
    $('finalLine').textContent = grade.label + ' — ' + nRight + '/' + ROUNDS + ' carrots tracked. ' +
      (nRight >= 7 ? 'Eagle-eyed bunny — nothing slips past you!' :
       nRight >= 4 ? 'Sharp tracking — a few shuffles fooled you.' :
       'Keep your eyes glued to the carrot — you\'ll get quicker!');
    EduSDK.submitScore(score, { grade: grade.id, right: nRight })
      .then(function (res) {
        var el = $('saveMsg');
        if (res && res.success) el.innerHTML = res.isPersonalBest
          ? '<span class="pb">🏆 New personal best — on the leaderboard!</span>' : 'Score saved to the leaderboard.';
        else if (res && res.offline) el.textContent = 'Standalone mode — play on OnlyGrins to earn GP!';
        else el.textContent = (res && res.error === 'not_authenticated') ? 'Sign in on OnlyGrins to save your score.' : 'Could not save score.';
      })
      .then(function () { return EduSDK.end({ score: score }); });
  }

  function startGame(g) {
    grade = g; q = 0; score = 0; streak = 0; nRight = 0;
    $('scoreVal').textContent = '0';
    $('start').classList.add('hidden'); $('final').classList.add('hidden');
    $('game').classList.remove('hidden');
    render();
  }

  Array.prototype.forEach.call(document.querySelectorAll('#start .gradeBtn'), function (b) {
    b.addEventListener('click', function () { startGame(GRADES[Number(b.dataset.grade)]); });
  });
  $('againBtn').addEventListener('click', function () { startGame(grade); });
  $('changeBtn').addEventListener('click', function () {
    $('final').classList.add('hidden'); $('start').classList.remove('hidden');
  });

  $('sdknote').textContent = EduSDK.isHosted() ? 'SDK: connected' : 'SDK: standalone (scoring no-ops)';
  EduSDK.begin({ game: 'burrow-recall' });
})();
</script>
</body>
</html>
