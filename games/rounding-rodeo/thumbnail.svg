<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2408"/><stop offset=".5" stop-color="#4a2e0c"/><stop offset="1" stop-color="#241604"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#ff6b81"/><stop offset="1" stop-color="#c77dff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- desert sun + cactus -->
  <circle cx="840" cy="90" r="46" fill="#ffb84d" opacity=".9"/>
  <text x="80" y="180" font-size="70">🌵</text>
  <!-- stampeding number on bull -->
  <text x="330" y="270" font-size="120" text-anchor="middle">🐂</text>
  <text x="470" y="250" font-size="90" font-weight="800" fill="#fff3e0">47</text>
  <text x="580" y="230" font-size="46">💨</text>
  <!-- corrals -->
  <g font-weight="800" text-anchor="middle">
    <rect x="620" y="330" width="140" height="90" rx="14" fill="#2a1a06" stroke="#ffb84d" stroke-width="6"/>
    <text x="690" y="375" font-size="40" fill="#fff3e0">40</text>
    <text x="690" y="410" font-size="20" fill="#dcbf94">🚧 corral</text>
    <rect x="790" y="330" width="140" height="90" rx="14" fill="#2a1a06" stroke="#3ee87a" stroke-width="6"/>
    <text x="860" y="375" font-size="40" fill="#3ee87a">50</text>
    <text x="860" y="410" font-size="20" fill="#dcbf94">🚧 corral</text>
  </g>
  <!-- cowboy -->
  <text x="150" y="400" font-size="96" text-anchor="middle">🤠</text>
  <text x="255" y="340" font-size="38" font-weight="800" fill="#3ee87a" transform="rotate(-8 255 340)">YEE-HAW!</text>
  <text x="480" y="500" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Rounding Rodeo</text>
</svg>
