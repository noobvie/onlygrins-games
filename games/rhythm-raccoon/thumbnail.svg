    <rect x="490" y="270" width="100" height="100" rx="18" fill="#3ee87a"/><text x="540" y="340" font-size="46" text-anchor="middle">🔔</text>
    <rect x="610" y="270" width="100" height="100" rx="18" fill="#ffb84d"/><text x="660" y="340" font-size="46" text-anchor="middle">🎸</text>
  </g>
  <text x="180" y="180" font-size="50">🎶</text>
  <text x="760" y="200" font-size="50">🎶</text>
  <text x="480" y="440" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Rhythm Raccoon</text>
