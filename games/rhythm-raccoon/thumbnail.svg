      <stop offset="0" stop-color="#111a2e"/><stop offset=".5" stop-color="#182541"/><stop offset="1" stop-color="#0a111f"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8fc0"/><stop offset=".5" stop-color="#c77dff"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="480" y="250" font-size="150" text-anchor="middle">🦝</text>
