<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2a14"/><stop offset=".5" stop-color="#4a361c"/><stop offset="1" stop-color="#241a0c"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <!-- plank wall texture stripes -->
  <g fill="#5a4020" opacity=".5">
    <rect x="0" y="40" width="960" height="14"/><rect x="0" y="140" width="960" height="14"/>
    <rect x="0" y="240" width="960" height="14"/><rect x="0" y="340" width="960" height="14"/>
    <rect x="0" y="440" width="960" height="14"/>
  </g>
  <!-- crafting grid -->
  <g>
    <rect x="120" y="120" width="270" height="270" fill="#241a0c" stroke="#6e5228" stroke-width="8"/>
    <g stroke="#6e5228" stroke-width="6">
      <line x1="210" y1="120" x2="210" y2="390"/><line x1="300" y1="120" x2="300" y2="390"/>
      <line x1="120" y1="210" x2="390" y2="210"/><line x1="120" y1="300" x2="390" y2="300"/>
    </g>
    <g font-size="52" text-anchor="middle">
      <text x="165" y="185">🪵</text><text x="255" y="185">🪵</text>
      <text x="165" y="275">🪵</text><text x="255" y="275">🪵</text>
      <text x="345" y="365">❓</text>
    </g>
  </g>
  <!-- arrow + result -->
  <text x="450" y="280" font-size="60" font-weight="800" fill="#f7ecd9">→</text>
  <text x="560" y="295" font-size="96" text-anchor="middle">🚪</text>
  <text x="560" y="360" font-size="30" font-weight="800" fill="#ffb84d" text-anchor="middle">× how many?</text>
  <!-- guild characters -->
  <text x="790" y="240" font-size="96" text-anchor="middle">👷</text>
  <text x="850" y="380" font-size="60" text-anchor="middle">🦔</text>
  <text x="870" y="300" font-size="40" text-anchor="middle">📋</text>
  <!-- title -->
  <text x="484" y="504" font-size="58" font-weight="800" fill="#1a1206" text-anchor="middle">Block Builder's Guild</text>
  <text x="480" y="500" font-size="58" font-weight="800" fill="#f7ecd9" text-anchor="middle">Block Builder's Guild</text>
</svg>
