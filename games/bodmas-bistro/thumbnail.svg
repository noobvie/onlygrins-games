<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e0a1c"/><stop offset=".5" stop-color="#40102a"/><stop offset="1" stop-color="#1a0612"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#ff6b81"/><stop offset="1" stop-color="#c77dff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- recipe card -->
  <g transform="rotate(-3 300 200)">
    <rect x="110" y="110" width="390" height="180" rx="16" fill="#ffefda" stroke="#c99b57" stroke-width="7"/>
    <text x="305" y="155" font-size="24" font-weight="800" fill="#8a5a1e" text-anchor="middle" letter-spacing="3">TODAY'S RECIPE</text>
    <text x="305" y="235" font-size="64" font-weight="800" fill="#4a2c10" text-anchor="middle">3 + 4 × 2</text>
    <circle cx="404" cy="215" r="40" fill="none" stroke="#3ee87a" stroke-width="6" stroke-dasharray="10 8"/>
  </g>
  <!-- chef -->
  <text x="680" y="330" font-size="150" text-anchor="middle">👨‍🍳</text>
  <!-- explosion -->
  <text x="830" y="180" font-size="90" text-anchor="middle">💥</text>
  <text x="560" y="120" font-size="56">🍲</text>
  <text x="860" y="400" font-size="42" font-weight="800" fill="#ff6b81" text-anchor="middle" transform="rotate(6 860 400)">KA-BOOM!</text>
  <!-- order note -->
  <text x="180" y="400" font-size="34" font-weight="800" fill="#5ad8ff">× cooks first, chef!</text>
  <text x="480" y="495" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">BODMAS Bistro</text>
</svg>
