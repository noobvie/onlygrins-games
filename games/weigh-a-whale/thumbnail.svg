<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#062c3a"/><stop offset=".5" stop-color="#0a3d4d"/><stop offset="1" stop-color="#04202e"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5ad8ff"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#ffb84d"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- bubbles -->
  <g fill="#5ad8ff" opacity=".25">
    <circle cx="120" cy="110" r="16"/><circle cx="850" cy="90" r="24"/><circle cx="790" cy="380" r="12"/><circle cx="80" cy="330" r="10"/>
  </g>
  <!-- weighing scale platform -->
  <rect x="290" y="330" width="380" height="34" rx="12" fill="#ffefc9" stroke="#5a3a1a" stroke-width="6"/>
  <rect x="430" y="364" width="100" height="60" rx="10" fill="#5a3a1a"/>
  <rect x="400" y="404" width="160" height="22" rx="8" fill="#3a2510"/>
  <!-- dial -->
  <circle cx="480" cy="392" r="26" fill="#ffefc9" stroke="#3a2510" stroke-width="4"/>
  <line x1="480" y1="392" x2="496" y2="376" stroke="#ff6b81" stroke-width="4" stroke-linecap="round"/>
  <!-- whale on the scale -->
  <text x="480" y="330" font-size="170" text-anchor="middle">🐋</text>
  <!-- doctor + review -->
  <text x="170" y="300" font-size="86" text-anchor="middle">🩺</text>
  <g transform="rotate(6 800 200)">
    <rect x="700" y="150" width="200" height="90" rx="14" fill="#ffefda" stroke="#c99b57" stroke-width="5"/>
    <text x="800" y="190" font-size="26" text-anchor="middle">⭐☆☆☆☆</text>
    <text x="800" y="222" font-size="20" font-weight="800" fill="#4a2c10" text-anchor="middle">"Rude." — Wanda</text>
  </g>
  <text x="480" y="490" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Weigh-a-Whale</text>
</svg>
