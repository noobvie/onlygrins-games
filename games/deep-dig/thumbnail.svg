<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <rect width="960" height="540" fill="#120e1c"/>
  <!-- layered underground cross-section -->
  <rect x="0" y="0" width="960" height="90" fill="#87b5e0"/>
  <rect x="0" y="90" width="960" height="34" fill="#4aa832"/>
  <rect x="0" y="124" width="960" height="120" fill="#8a5a3a"/>
  <rect x="0" y="244" width="960" height="200" fill="#6e6e76"/>
  <rect x="0" y="444" width="960" height="96" fill="#c2571f"/>
  <!-- speckles -->
  <g fill="rgba(0,0,0,.2)">
    <rect x="120" y="150" width="14" height="10"/><rect x="420" y="190" width="14" height="10"/><rect x="720" y="160" width="14" height="10"/>
    <rect x="220" y="290" width="14" height="10"/><rect x="560" y="330" width="14" height="10"/><rect x="820" y="380" width="14" height="10"/>
  </g>
  <!-- ruler -->
  <g font-size="30" font-weight="800" text-anchor="end">
    <text x="70" y="70" fill="#f0eaff">+2</text>
    <text x="70" y="115" fill="#3ee87a">0</text>
    <text x="70" y="180" fill="#f0eaff">−2</text>
    <text x="70" y="290" fill="#f0eaff">−5</text>
    <text x="70" y="410" fill="#f0eaff">−9</text>
    <text x="70" y="500" fill="#ffb84d">−12</text>
  </g>
  <g stroke="rgba(255,255,255,.25)" stroke-width="3">
    <line x1="90" y1="124" x2="960" y2="124"/><line x1="90" y1="184" x2="960" y2="184"/>
    <line x1="90" y1="244" x2="960" y2="244"/><line x1="90" y1="304" x2="960" y2="304"/>
    <line x1="90" y1="364" x2="960" y2="364"/><line x1="90" y1="424" x2="960" y2="424"/>
  </g>
  <!-- miner, gems, bat, lava -->
  <text x="300" y="230" font-size="66">👷</text>
  <text x="640" y="410" font-size="60">💎</text>
  <text x="800" y="220" font-size="50">🦇</text>
  <text x="180" y="512" font-size="50">🔥</text>
  <text x="430" y="300" font-size="42" font-weight="800" fill="#5ad8ff" transform="rotate(-4 430 300)">dig down 5!</text>
  <!-- title -->
  <text x="484" y="84" font-size="72" font-weight="800" fill="#0e0a18" text-anchor="middle">Deep Dig</text>
  <text x="480" y="80" font-size="72" font-weight="800" fill="#f0eaff" text-anchor="middle">Deep Dig</text>
</svg>
