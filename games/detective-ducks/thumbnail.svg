<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241333"/><stop offset=".5" stop-color="#331b47"/><stop offset="1" stop-color="#180d24"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- lineup wall -->
  <rect x="120" y="70" width="720" height="10" rx="5" fill="#6e4a94" opacity=".6"/>
  <rect x="120" y="140" width="720" height="10" rx="5" fill="#6e4a94" opacity=".4"/>
  <rect x="120" y="210" width="720" height="10" rx="5" fill="#6e4a94" opacity=".25"/>
  <!-- suspect ducks -->
  <g text-anchor="middle">
    <text x="220" y="300" font-size="96">🦆</text>
    <text x="220" y="215" font-size="46">🎩</text>
    <text x="420" y="300" font-size="96">🦆</text>
    <text x="420" y="220" font-size="46">🕶️</text>
    <text x="620" y="300" font-size="96">🦆</text>
    <text x="620" y="220" font-size="46">🎀</text>
    <text x="820" y="300" font-size="96">🦆</text>
    <text x="820" y="220" font-size="46">☂️</text>
  </g>
  <!-- spotlight on suspect 2 -->
  <polygon points="360,0 480,0 470,330 370,330" fill="#ffb84d" opacity=".12"/>
  <!-- detective + evidence -->
  <text x="80" y="440" font-size="80" text-anchor="middle">🕵️</text>
  <text x="895" y="430" font-size="56" text-anchor="middle">🍞</text>
  <text x="895" y="360" font-size="40" text-anchor="middle">🔍</text>
  <text x="480" y="490" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Detective Ducks</text>
</svg>
