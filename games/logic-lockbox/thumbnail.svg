<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1430"/><stop offset=".5" stop-color="#241a42"/><stop offset="1" stop-color="#0f0b1e"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd76a"/><stop offset=".5" stop-color="#c77dff"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="150" y="300" font-size="150" text-anchor="middle">🔐</text>
  <text x="150" y="150" font-size="60">🕵️</text>
  <!-- clue cards -->
  <g font-family="'Baloo 2',sans-serif" font-weight="800">
    <rect x="330" y="120" width="500" height="60" rx="12" fill="#241a42" stroke="#ffd76a" stroke-width="3"/>
    <text x="355" y="158" font-size="26" fill="#f1ecff">🔎 The digits add up to 12</text>
    <rect x="330" y="195" width="500" height="60" rx="12" fill="#241a42" stroke="#ffd76a" stroke-width="3"/>
    <text x="355" y="233" font-size="26" fill="#f1ecff">🔎 The first digit is ODD</text>
    <rect x="330" y="270" width="500" height="60" rx="12" fill="#241a42" stroke="#ffd76a" stroke-width="3"/>
    <text x="355" y="308" font-size="26" fill="#f1ecff">🔎 There is no 7</text>
  </g>
  <text x="480" y="440" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Logic Lockbox</text>
  <text x="480" y="486" fill="#bcaee6" font-size="26" font-weight="700" text-anchor="middle">Read the clues — crack the code!</text>
</svg>
