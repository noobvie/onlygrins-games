<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2630"/><stop offset=".5" stop-color="#123544"/><stop offset="1" stop-color="#07161d"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5ad8ff"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#c77dff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="480" y="250" font-size="150" text-anchor="middle">🦉</text>
  <!-- rising notes -->
  <text x="230" y="380" font-size="60">🎵</text>
  <text x="360" y="330" font-size="66">🎶</text>
  <text x="520" y="270" font-size="74">🎵</text>
  <text x="680" y="210" font-size="80">🎶</text>
  <line x1="250" y1="390" x2="720" y2="200" stroke="#2a6079" stroke-width="4" stroke-dasharray="8 8"/>
  <text x="150" y="180" font-size="46">⬆️</text>
  <text x="790" y="360" font-size="46">⬇️</text>
  <text x="480" y="450" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Pitch Patrol</text>
  <text x="480" y="496" fill="#9fcfe0" font-size="26" font-weight="700" text-anchor="middle">Higher or lower? Train your ears!</text>
</svg>
