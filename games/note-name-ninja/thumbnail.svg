<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1a2e"/><stop offset=".5" stop-color="#122540"/><stop offset="1" stop-color="#080f1c"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- white staff card -->
  <rect x="120" y="120" width="620" height="220" rx="18" fill="#fff"/>
  <g stroke="#333" stroke-width="4">
    <line x1="160" y1="160" x2="700" y2="160"/>
    <line x1="160" y1="200" x2="700" y2="200"/>
    <line x1="160" y1="240" x2="700" y2="240"/>
    <line x1="160" y1="280" x2="700" y2="280"/>
    <line x1="160" y1="320" x2="700" y2="320"/>
  </g>
  <text x="175" y="315" font-size="150" fill="#222" font-family="serif">𝄞</text>
  <!-- a couple of notes -->
  <g fill="#111">
    <ellipse cx="420" cy="240" rx="20" ry="15" transform="rotate(-18 420 240)"/>
    <rect x="437" y="165" width="5" height="75"/>
    <ellipse cx="560" cy="200" rx="20" ry="15" transform="rotate(-18 560 200)"/>
    <rect x="577" y="125" width="5" height="75"/>
  </g>
  <!-- ninja -->
  <text x="830" y="270" font-size="120" text-anchor="middle">🥷</text>
  <text x="800" y="150" font-size="46">🎵</text>
  <text x="480" y="420" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Note Name Ninja</text>
  <text x="480" y="470" font-size="24" fill="#9fbce8" text-anchor="middle">FACE · Every Good Boy Deserves Fruit</text>
</svg>
