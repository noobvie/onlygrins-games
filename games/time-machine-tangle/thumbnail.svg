<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20143a"/><stop offset=".5" stop-color="#2c1c4e"/><stop offset="1" stop-color="#120a22"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd76a"/><stop offset=".5" stop-color="#c77dff"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="90" y="160" font-size="70">⏳</text>
  <!-- timeline arrow -->
  <line x1="140" y1="250" x2="820" y2="250" stroke="#513a86" stroke-width="6"/>
  <polygon points="820,235 855,250 820,265" fill="#513a86"/>
  <g text-anchor="middle">
    <circle cx="210" cy="250" r="52" fill="#271947" stroke="#ffd76a" stroke-width="4"/><text x="210" y="272" font-size="52">🦕</text>
    <circle cx="370" cy="250" r="52" fill="#271947" stroke="#ffd76a" stroke-width="4"/><text x="370" y="272" font-size="48">🔺</text>
    <circle cx="530" cy="250" r="52" fill="#271947" stroke="#ffd76a" stroke-width="4"/><text x="530" y="272" font-size="48">🏰</text>
    <circle cx="690" cy="250" r="52" fill="#271947" stroke="#ffd76a" stroke-width="4"/><text x="690" y="272" font-size="48">🚀</text>
  </g>
  <text x="205" y="150" font-size="30" fill="#c1b0e6" font-weight="800">oldest ➜ newest</text>
  <text x="480" y="420" fill="url(#ttl)" font-size="60" font-weight="800" text-anchor="middle">Time Machine Tangle</text>
  <text x="480" y="466" fill="#c1b0e6" font-size="26" font-weight="700" text-anchor="middle">Put history back in order!</text>
</svg>
