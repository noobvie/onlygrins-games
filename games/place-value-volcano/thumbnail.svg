<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0e12"/><stop offset=".5" stop-color="#3d1408"/><stop offset="1" stop-color="#1c0808"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8a5c"/><stop offset=".5" stop-color="#ff6b81"/><stop offset="1" stop-color="#c77dff"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6e3a22"/><stop offset="1" stop-color="#3a1c10"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- volcano -->
  <polygon points="480,120 750,430 210,430" fill="url(#mtn)"/>
  <ellipse cx="480" cy="130" rx="90" ry="26" fill="#ff5c33"/>
  <path d="M410,140 Q440,90 480,120 Q520,80 560,135" fill="none" stroke="#ff8a5c" stroke-width="14" stroke-linecap="round"/>
  <!-- vents with labels -->
  <g font-weight="800" font-size="20" fill="#ffe9dd" text-anchor="middle">
    <ellipse cx="360" cy="300" rx="46" ry="26" fill="#1c0808" stroke="#ff8a5c" stroke-width="4"/>
    <text x="360" y="307">TENS</text>
    <ellipse cx="600" cy="300" rx="46" ry="26" fill="#1c0808" stroke="#ff8a5c" stroke-width="4"/>
    <text x="600" y="307">ONES</text>
    <ellipse cx="480" cy="380" rx="62" ry="28" fill="#1c0808" stroke="#ff8a5c" stroke-width="4"/>
    <text x="480" y="387">HUNDREDS</text>
  </g>
  <!-- digit boulders -->
  <g font-weight="800" font-size="40" fill="#ffe9dd" text-anchor="middle">
    <circle cx="150" cy="180" r="46" fill="#4a2a18" stroke="#7a4a2e" stroke-width="6"/><text x="150" y="195">7</text>
    <circle cx="820" cy="160" r="46" fill="#4a2a18" stroke="#7a4a2e" stroke-width="6"/><text x="820" y="175">3</text>
    <circle cx="860" cy="330" r="46" fill="#4a2a18" stroke="#7a4a2e" stroke-width="6"/><text x="860" y="345">4</text>
  </g>
  <!-- sneeze -->
  <text x="700" y="110" font-size="48" font-weight="800" fill="#ff6b81" transform="rotate(-8 700 110)">AAA-CHOO!</text>
  <text x="130" y="420" font-size="60">🤧</text>
  <text x="480" y="500" fill="url(#ttl)" font-size="62" font-weight="800" text-anchor="middle">Place Value Volcano</text>
</svg>
