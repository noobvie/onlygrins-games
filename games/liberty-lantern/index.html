<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Liberty Lantern — OnlyGrins</title>

<script src="/sdk/arcade-sdk.js"></script>
<script src="edu-sdk.js"></script>
<script src="bgm.js" data-cat="civics" data-seed="liberty-lantern"></script>

<style>
  :root{
    --bg1:#101a33; --bg2:#1c2c52; --bg3:#0a1122;
    --card:#16233f; --line:#3f5a99; --text:#eef3ff; --muted:#aebede;
    --green:#7bf0a8; --blue:#6ec8ff; --purple:#c77dff; --gold:#ffd15a; --bad:#ff6b81; --lamp:#ffe08a;
  }
  *{box-sizing:border-box;} html,body{margin:0;height:100%;}
  body{background:linear-gradient(135deg,var(--bg1),var(--bg2) 50%,var(--bg3));
    color:var(--text);font:16px/1.45 "Baloo 2","Comic Sans MS",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100%;padding:16px;
    user-select:none;-webkit-user-select:none;}
  .wrap{width:min(960px,100%);}
  .card{background:var(--card);border:2px solid var(--line);border-radius:22px;
    padding:20px 26px;box-shadow:0 18px 50px rgba(0,0,0,.5);}
  h1{margin:0 0 4px;font-size:clamp(24px,4.5vw,40px);font-weight:800;text-align:center;
    background:linear-gradient(90deg,var(--gold),var(--green),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);text-align:center;margin:0 0 16px;}
  .grades{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
  .gradeBtn{cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:17px;
    padding:14px 20px;border-radius:16px;color:#0a1122;box-shadow:0 6px 0 rgba(0,0,0,.35);}
  .gradeBtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.35);}
  .g1{background:var(--green);} .g2{background:var(--blue);} .g3{background:var(--purple);}
  .gradeBtn small{display:block;font-weight:700;font-size:12px;opacity:.75;}

  .top{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-weight:800;}
  .top .round{color:var(--blue);} .top .spacer{flex:1;}
  .top .score{color:var(--green);font-size:20px;}
  .scene{background:#0f1c38;border:2px solid var(--line);border-left:6px solid var(--lamp);border-radius:14px;
    padding:18px 20px;margin:10px 0 14px;font-size:clamp(18px,3.4vw,24px);font-weight:700;text-align:center;}
  .scene .lamp{font-size:32px;display:block;margin-bottom:6px;}
  .q{text-align:center;color:var(--muted);font-weight:800;margin-bottom:10px;}
  .opts{display:grid;gap:10px;max-width:560px;margin:0 auto;}
  .opt{cursor:pointer;border:2px solid var(--line);background:#12203c;border-radius:14px;
    padding:14px 16px;text-align:center;font-weight:800;font-size:clamp(16px,3.2vw,20px);box-shadow:0 5px 0 rgba(0,0,0,.35);transition:.1s;}
  .opt:active{transform:translateY(2px);}
  .opt.right{border-color:var(--green);background:#12402c;}
  .opt.wrong{border-color:var(--bad);background:#3f1622;}
  .toast{min-height:24px;text-align:center;font-weight:800;font-size:16px;margin-top:14px;}
  .toast.good{color:var(--green);} .toast.bad{color:var(--bad);}
  .shake{animation:shake .45s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
  .final{text-align:center;padding:12px 0;}
  .final .big{font-size:58px;font-weight:800;color:var(--green);margin:8px 0;}
  .final p{color:var(--muted);margin:6px 0;} .final .pb{color:var(--green);font-weight:800;}
  .actions{display:flex;justify-content:center;gap:12px;}
  .hidden{display:none!important;}
  .sdknote{margin-top:12px;text-align:center;font:12px ui-monospace,Consolas,monospace;color:#7f92c8;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">

    <div id="start">
      <h1>🏮 Liberty Lantern</h1>
      <p class="sub">Hold up the lantern and a situation lights up. Choose which <b>freedom</b> or <b>right</b>
        is protecting it — speech, press, religion, assembly, a fair trial and more.</p>
      <div class="grades">
        <button class="gradeBtn g1" data-grade="0">Grade 1–2<small>everyday rights</small></button>
        <button class="gradeBtn g2" data-grade="1">Grade 3<small>the five freedoms</small></button>
        <button class="gradeBtn g3" data-grade="2">Grade 4–5<small>fair trials &amp; equality</small></button>
      </div>
      <p class="sub">8 scenes per run · correct calls earn streak bonuses</p>
    </div>

    <div id="game" class="hidden">
      <div class="top">
        <span class="round" id="roundLbl">Scene 1/8</span>
        <span class="spacer"></span>
        <span class="score">⭐ <span id="scoreVal">0</span></span>
      </div>
      <div class="scene" id="scene"></div>
      <div class="q">Which right protects this?</div>
      <div class="opts" id="opts"></div>
      <div class="toast" id="toast"></div>
    </div>

    <div id="final" class="hidden final">
      <div style="font-size:76px" id="finalEmoji">🏮</div>
      <p id="finalLine"></p>
      <div class="big" id="finalScore">0</div>
      <p id="saveMsg">Saving your score…</p>
      <div class="actions">
        <button class="gradeBtn g1" id="againBtn">New scenes ▸</button>
        <button class="gradeBtn g2" id="changeBtn">Change grade</button>
      </div>
    </div>

    <div class="sdknote" id="sdknote"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var BANDS = [
    { rights: ['Free speech','Freedom of religion','Right to vote','Fair treatment','Right to learn','Right to be safe'],
      scenes: [
        ['You share your opinion about the class rules.', 'Free speech'],
        ['Your family worships however you choose.', 'Freedom of religion'],
        ['Grown-ups pick their leaders at the ballot box.', 'Right to vote'],
        ['Every kid is treated the same, no matter what.', 'Fair treatment'],
        ['All children can go to school and learn.', 'Right to learn'],
        ['You feel protected at home and at school.', 'Right to be safe']
      ] },
    { rights: ['Freedom of speech','Freedom of the press','Freedom of religion','Freedom to assemble','Right to petition'],
      scenes: [
        ['A newspaper prints a story the mayor dislikes.', 'Freedom of the press'],
        ['People march peacefully for a cause they believe in.', 'Freedom to assemble'],
        ['You write to the government asking them to fix the park.', 'Right to petition'],
        ['You pray — or choose not to — however you like.', 'Freedom of religion'],
        ['A kid gives a speech criticising a new rule.', 'Freedom of speech'],
        ['Friends start a club and meet up together.', 'Freedom to assemble']
      ] },
    { rights: ['Right to a fair trial','Equal protection','Right to privacy','Freedom of speech','Freedom of religion','Right to vote'],
      scenes: [
        ['Someone accused of a crime gets a fair trial with a judge.', 'Right to a fair trial'],
        ['The law must treat everyone equally.', 'Equal protection'],
        ['Police need a good reason to search your things.', 'Right to privacy'],
        ['You can criticise the government without being punished.', 'Freedom of speech'],
        ['You may follow any religion, or none at all.', 'Freedom of religion'],
        ['Citizens choose their leaders in elections.', 'Right to vote']
      ] }
  ];
  var GRADES = [ {id:1,label:'Grade 1–2'}, {id:3,label:'Grade 3'}, {id:4,label:'Grade 4–5'} ];
  var ROUNDS = 8;

  var CHEER = ['Rights expert! 🏮🎉','That freedom is safe with you! 🌟','Civic superstar! 💚','Liberty and justice! ✨'];
  var OOPS  = ['Not that one — think again. 🏮','A different freedom fits better. 🤔','Good try — check the next scene!'];

  var gradeIdx = 0, q = 0, score = 0, streak = 0, nRight = 0;
  var cur = null, locked = false;

  var $ = function (id){ return document.getElementById(id); };
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

  var AC = window.AudioContext || window.webkitAudioContext, actx = null;
  function tone(f,d,t,slide){ try{ actx=actx||new AC(); var o=actx.createOscillator(),g=actx.createGain();
    o.type=t||'sine'; o.frequency.value=f; if(slide)o.frequency.exponentialRampToValueAtTime(slide,actx.currentTime+d);
    g.gain.setValueAtTime(.08,actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+d);}catch(e){} }
  function good(){ tone(523,.1,'sine'); setTimeout(function(){ tone(784,.18,'sine',1046); },110); }
  function bad(){ tone(200,.3,'sawtooth',90); }

  function buildRound() {
    var band = BANDS[gradeIdx];
    var sc = pick(band.scenes);
    var correct = sc[1];
    var distract = shuffle(band.rights.slice()).filter(function (r) { return r !== correct; }).slice(0, 3);
    cur = { scene: sc[0], answer: correct, opts: shuffle([correct].concat(distract)) };
  }

  function render() {
    locked = false;
    buildRound();
    $('roundLbl').textContent = 'Scene ' + (q + 1) + '/' + ROUNDS;
    $('scene').innerHTML = '<span class="lamp">🏮</span>' + cur.scene;
    $('toast').textContent = ''; $('toast').className = 'toast';
    var o = $('opts'); o.innerHTML = '';
    cur.opts.forEach(function (r) {
      var b = document.createElement('div');
      b.className = 'opt'; b.textContent = r;
      b.addEventListener('click', function () { choose(r, b); });
      o.appendChild(b);
    });
    EduSDK.startLesson(q + 1, {});
  }

  function choose(r, el) {
    if (locked) return;
    locked = true;
    var correct = r === cur.answer;
    if (correct) {
      el.classList.add('right'); good(); nRight++; streak++;
      var pts = 100 + streak * 15; score += pts; $('scoreVal').textContent = score;
      $('toast').textContent = pick(CHEER) + '  +' + pts; $('toast').className = 'toast good';
    } else {
      el.classList.add('wrong'); bad(); streak = 0;
      Array.prototype.forEach.call($('opts').children, function (c) { if (c.textContent === cur.answer) c.classList.add('right'); });
      $('card').classList.add('shake'); setTimeout(function(){ $('card').classList.remove('shake'); }, 500);
      $('toast').textContent = pick(OOPS) + ' It\'s ' + cur.answer + '.'; $('toast').className = 'toast bad';
      var _pen = EduSDK.applyPenalty(score, parseInt(GRADES[gradeIdx].id, 10)); score = _pen.score; $('scoreVal').textContent = score; // wrong → −20 (Grade 3+), floored at 0
      if (_pen.delta) $('toast').textContent += '  ' + _pen.delta; // show the −20
    }
    EduSDK.finishLesson(q + 1, { correct: correct });
    next();
  }

  function next() {
    q++;
    if (q >= ROUNDS) return setTimeout(finish, 1700);
    if (q === Math.floor(ROUNDS / 2)) setTimeout(function(){ EduSDK.adBreak('interlevel').then(render); }, 1700);
    else setTimeout(render, 1700);
  }

  function finish() {
    $('game').classList.add('hidden'); $('final').classList.remove('hidden');
    $('finalScore').textContent = score;
    $('finalEmoji').textContent = nRight >= 7 ? '🏮🏆' : nRight >= 4 ? '🏮⚖️' : '🏮📜';
    $('finalLine').textContent = GRADES[gradeIdx].label + ' — ' + nRight + '/' + ROUNDS + ' scenes right. ' +
      (nRight >= 7 ? 'A true defender of rights and freedoms!' :
       nRight >= 4 ? 'Solid civics — a few freedoms got mixed up.' :
       'Keep learning your rights — they belong to everyone!');
    EduSDK.submitScore(score, { grade: GRADES[gradeIdx].id, right: nRight })
      .then(function (res) {
        var el = $('saveMsg');
        if (res && res.success) el.innerHTML = res.isPersonalBest
          ? '<span class="pb">🏆 New personal best — on the leaderboard!</span>' : 'Score saved to the leaderboard.';
        else if (res && res.offline) el.textContent = 'Standalone mode — play on OnlyGrins to earn GP!';
        else el.textContent = (res && res.error === 'not_authenticated') ? 'Sign in on OnlyGrins to save your score.' : 'Could not save score.';
      })
      .then(function () { return EduSDK.end({ score: score }); });
  }

  function startGame(idx) {
    gradeIdx = idx; q = 0; score = 0; streak = 0; nRight = 0;
    $('scoreVal').textContent = '0';
    $('start').classList.add('hidden'); $('final').classList.add('hidden');
    $('game').classList.remove('hidden');
    render();
  }

  Array.prototype.forEach.call(document.querySelectorAll('#start .gradeBtn'), function (b) {
    b.addEventListener('click', function () { startGame(Number(b.dataset.grade)); });
  });
  $('againBtn').addEventListener('click', function () { startGame(gradeIdx); });
  $('changeBtn').addEventListener('click', function () {
    $('final').classList.add('hidden'); $('start').classList.remove('hidden');
  });

  $('sdknote').textContent = EduSDK.isHosted() ? 'SDK: connected' : 'SDK: standalone (scoring no-ops)';
  EduSDK.begin({ game: 'liberty-lantern' });
})();
</script>
</body>
</html>
