<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071b33"/><stop offset=".5" stop-color="#0a2547"/><stop offset="1" stop-color="#041226"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c77dff"/><stop offset=".5" stop-color="#5ad8ff"/><stop offset="1" stop-color="#3ee87a"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- grid -->
  <g stroke="#1d4a7a" stroke-width="3">
    <line x1="360" y1="60" x2="360" y2="400"/><line x1="440" y1="60" x2="440" y2="400"/>
    <line x1="520" y1="60" x2="520" y2="400"/><line x1="600" y1="60" x2="600" y2="400"/>
    <line x1="680" y1="60" x2="680" y2="400"/><line x1="760" y1="60" x2="760" y2="400"/>
    <line x1="360" y1="60" x2="760" y2="60"/><line x1="360" y1="145" x2="760" y2="145"/>
    <line x1="360" y1="230" x2="760" y2="230"/><line x1="360" y1="315" x2="760" y2="315"/>
    <line x1="360" y1="400" x2="760" y2="400"/>
  </g>
  <g fill="#9cbcdd" font-size="26" font-weight="800" text-anchor="middle">
    <text x="360" y="440">0</text><text x="440" y="440">1</text><text x="520" y="440">2</text>
    <text x="600" y="440">3</text><text x="680" y="440">4</text><text x="760" y="440">5</text>
    <text x="330" y="410">0</text><text x="330" y="325">1</text><text x="330" y="240">2</text>
    <text x="330" y="155">3</text><text x="330" y="70">4</text>
  </g>
  <!-- shoe target -->
  <circle cx="680" cy="145" r="34" fill="none" stroke="#ffb84d" stroke-width="6" stroke-dasharray="12 8"/>
  <text x="680" y="160" font-size="42" text-anchor="middle">👟</text>
  <!-- squid + tentacle -->
  <text x="160" y="330" font-size="150" text-anchor="middle">🦑</text>
  <path d="M230,290 Q400,190 640,155" fill="none" stroke="#c77dff" stroke-width="10" stroke-linecap="round" stroke-dasharray="2 18"/>
  <!-- tuna -->
  <text x="850" y="330" font-size="60" text-anchor="middle">🐟</text>
  <text x="850" y="270" font-size="30" font-weight="800" fill="#ff6b81" text-anchor="middle">SLAP!</text>
  <!-- callout -->
  <text x="160" y="120" font-size="44" font-weight="800" fill="#5ad8ff">(4, 3)!</text>
  <text x="480" y="500" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Grid Squid</text>
</svg>
