<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2e30"/><stop offset=".5" stop-color="#164a48"/><stop offset="1" stop-color="#08201f"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd15a"/><stop offset=".5" stop-color="#5fe0b0"/><stop offset="1" stop-color="#6ec8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="480" y="90" fill="#eafffb" font-size="30" font-weight="800" text-anchor="middle">Tax coins left: <tspan fill="#ffcf4d">0 🪙</tspan></text>
  <!-- service cards -->
  <g text-anchor="middle">
    <g>
      <rect x="120" y="130" width="200" height="200" rx="18" fill="#0e332f" stroke="#5fe0b0" stroke-width="5"/>
      <text x="220" y="195" font-size="48">🚒</text><text x="220" y="235" fill="#eafffb" font-size="20" font-weight="800">Fire Station</text>
      <text x="220" y="285" font-size="26" font-weight="800"><tspan fill="#ffcf4d">3</tspan><tspan fill="#a9dcd6"> / 3 ✅</tspan></text>
    </g>
    <g>
      <rect x="380" y="130" width="200" height="200" rx="18" fill="#0e332f" stroke="#5fe0b0" stroke-width="5"/>
      <text x="480" y="195" font-size="48">🏫</text><text x="480" y="235" fill="#eafffb" font-size="20" font-weight="800">School</text>
      <text x="480" y="285" font-size="26" font-weight="800"><tspan fill="#ffcf4d">4</tspan><tspan fill="#a9dcd6"> / 4 ✅</tspan></text>
    </g>
    <g>
      <rect x="640" y="130" width="200" height="200" rx="18" fill="#0e332f" stroke="#5fe0b0" stroke-width="5"/>
      <text x="740" y="195" font-size="48">🏥</text><text x="740" y="235" fill="#eafffb" font-size="20" font-weight="800">Hospital</text>
      <text x="740" y="285" font-size="26" font-weight="800"><tspan fill="#ffcf4d">5</tspan><tspan fill="#a9dcd6"> / 5 ✅</tspan></text>
    </g>
  </g>
  <text x="140" y="405" font-size="40">🪙</text><text x="200" y="405" font-size="40">🪙</text><text x="260" y="405" font-size="40">🪙</text>
  <text x="480" y="480" fill="url(#ttl)" font-size="68" font-weight="800" text-anchor="middle">Tax Depot</text>
</svg>
