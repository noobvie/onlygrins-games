<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#33200f"/><stop offset=".5" stop-color="#442b14"/><stop offset="1" stop-color="#1f1207"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#ff6b81"/><stop offset="1" stop-color="#c77dff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <text x="90" y="160" font-size="66">👨‍🍳</text>
  <text x="800" y="300" font-size="120" text-anchor="middle">🐞</text>
  <!-- recipe steps -->
  <g font-weight="700">
    <rect x="180" y="120" width="520" height="52" rx="12" fill="#3d2712" stroke="#7a5230" stroke-width="2"/>
    <text x="205" y="155" font-size="24" fill="#fff2e2">1  Take two slices of bread</text>
    <rect x="180" y="182" width="520" height="52" rx="12" fill="#3d2712" stroke="#7a5230" stroke-width="2"/>
    <text x="205" y="217" font-size="24" fill="#fff2e2">2  Spread butter on one</text>
    <rect x="180" y="244" width="520" height="52" rx="12" fill="#42191d" stroke="#ff6b81" stroke-width="3"/>
    <text x="205" y="279" font-size="24" fill="#ffd0d6">3  Spread toothpaste 🪥</text>
    <rect x="180" y="306" width="520" height="52" rx="12" fill="#3d2712" stroke="#7a5230" stroke-width="2"/>
    <text x="205" y="341" font-size="24" fill="#fff2e2">4  Press them together</text>
  </g>
  <text x="480" y="440" fill="url(#ttl)" font-size="60" font-weight="800" text-anchor="middle">Bug Hunt Bakery</text>
  <text x="480" y="486" fill="#dcb890" font-size="26" font-weight="700" text-anchor="middle">Find the buggy step — squash it!</text>
</svg>
