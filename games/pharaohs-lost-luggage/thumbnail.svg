      <stop offset="0" stop-color="#3a2c07"/><stop offset=".5" stop-color="#4d3a0a"/><stop offset="1" stop-color="#241b04"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd76a"/><stop offset=".5" stop-color="#ffb84d"/><stop offset="1" stop-color="#c77dff"/>
