<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#33210c"/><stop offset=".5" stop-color="#4a3312"/><stop offset="1" stop-color="#241708"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- two market stalls -->
  <g>
    <rect x="120" y="150" width="290" height="220" rx="16" fill="#54390f" stroke="#3ee87a" stroke-width="6"/>
    <path d="M 110 150 L 420 150 L 400 110 L 130 110 Z" fill="#3ee87a" opacity=".85"/>
    <text x="265" y="240" font-size="70" text-anchor="middle">🍎</text>
    <text x="265" y="320" font-size="34" font-weight="800" fill="#ffd54a" text-anchor="middle">3 for $6</text>
    <text x="265" y="355" font-size="20" font-weight="800" fill="#3ee87a" text-anchor="middle">BEST DEAL ✓</text>
  </g>
  <g>
    <rect x="550" y="150" width="290" height="220" rx="16" fill="#54390f" stroke="#a8802e" stroke-width="6"/>
    <path d="M 540 150 L 850 150 L 830 110 L 560 110 Z" fill="#ff6b81" opacity=".85"/>
    <text x="695" y="240" font-size="70" text-anchor="middle">🍎</text>
    <text x="695" y="320" font-size="34" font-weight="800" fill="#ffd54a" text-anchor="middle">$3 each</text>
    <text x="695" y="355" font-size="20" font-weight="800" fill="#ff6b81" text-anchor="middle">"SALE!" 🤥</text>
  </g>
  <!-- shopper -->
  <text x="480" y="420" font-size="72" text-anchor="middle">🧐</text>
  <text x="480" y="505" fill="url(#ttl)" font-size="62" font-weight="800" text-anchor="middle">Bargain Bazaar</text>
</svg>
