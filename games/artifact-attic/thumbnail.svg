<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241a2e"/><stop offset=".5" stop-color="#33253f"/><stop offset="1" stop-color="#180f20"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/><stop offset=".5" stop-color="#3ee87a"/><stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="35%" r="70%">
      <stop offset="0" stop-color="#3a2a50"/><stop offset="1" stop-color="#1a1226"/>
    </radialGradient>
  </defs>
  <rect width="960" height="540" rx="22" fill="url(#bg)"/>
  <!-- museum shelves -->
  <rect x="60" y="120" width="840" height="8" rx="4" fill="#7a5a9a" opacity=".5"/>
  <rect x="60" y="300" width="840" height="8" rx="4" fill="#7a5a9a" opacity=".4"/>
  <!-- display cases -->
  <g>
    <rect x="110" y="140" width="180" height="150" rx="14" fill="url(#spot)" stroke="#ffb84d" stroke-width="4"/>
    <text x="200" y="235" font-size="72" text-anchor="middle">🔺</text>
    <rect x="390" y="140" width="180" height="150" rx="14" fill="url(#spot)" stroke="#ffb84d" stroke-width="4"/>
    <text x="480" y="235" font-size="72" text-anchor="middle">🏺</text>
    <rect x="670" y="140" width="180" height="150" rx="14" fill="url(#spot)" stroke="#ffb84d" stroke-width="4"/>
    <text x="760" y="235" font-size="72" text-anchor="middle">🪖</text>
  </g>
  <!-- curator + labels -->
  <text x="150" y="410" font-size="76" text-anchor="middle">🧐</text>
  <text x="230" y="380" font-size="34">🏷️</text>
  <text x="820" y="400" font-size="60" text-anchor="middle">📜</text>
  <text x="480" y="475" fill="url(#ttl)" font-size="64" font-weight="800" text-anchor="middle">Artifact Attic</text>
</svg>
