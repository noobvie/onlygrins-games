<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Baloo 2','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123c6b"/><stop offset="1" stop-color="#0a1f3c"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd15a"/><stop offset="0.5" stop-color="#7be08a"/><stop offset="1" stop-color="#8fd4ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#sky)"/>
  <!-- clouds -->
  <g fill="#ffffff" fill-opacity="0.06">
    <circle cx="150" cy="120" r="46"/><circle cx="196" cy="128" r="36"/><circle cx="110" cy="128" r="32"/>
    <circle cx="820" cy="160" r="40"/><circle cx="860" cy="168" r="30"/>
  </g>
  <!-- wall with two openings -->
  <g>
    <rect x="620" y="-10" width="92" height="150" rx="8" fill="#2a6e4a"/>
    <rect x="620" y="270" width="92" height="70" rx="8" fill="#2a6e4a"/>
    <rect x="620" y="470" width="92" height="80" rx="8" fill="#2a6e4a"/>
    <rect x="620" y="-10" width="6" height="560" fill="#ffffff" fill-opacity="0.08"/>
    <!-- correct plaque (upper) -->
    <g transform="translate(666,205)">
      <rect x="-92" y="-20" width="184" height="40" rx="12" fill="#fff"/>
      <text x="0" y="8" text-anchor="middle" font-size="26" font-weight="800" fill="#123c6b">receive</text>
      <circle cx="118" cy="0" r="16" fill="#7be08a"/><text x="118" y="7" text-anchor="middle" font-size="20" font-weight="800" fill="#06210f">✓</text>
    </g>
    <!-- wrong plaque (lower) -->
    <g transform="translate(666,405)">
      <rect x="-88" y="-20" width="176" height="40" rx="12" fill="#fff"/>
      <text x="0" y="8" text-anchor="middle" font-size="26" font-weight="800" fill="#123c6b">recieve</text>
      <circle cx="112" cy="0" r="16" fill="#ff6b81"/><text x="112" y="7" text-anchor="middle" font-size="20" font-weight="800" fill="#3a0008">✕</text>
    </g>
  </g>
  <!-- bird -->
  <g transform="translate(300,215) rotate(-8)">
    <circle cx="0" cy="0" r="30" fill="#ffd15a" stroke="#a9781a" stroke-width="3"/>
    <ellipse cx="-6" cy="6" rx="17" ry="11" transform="rotate(-25 -6 6)" fill="#ffb838"/>
    <path d="M28,-4 L46,0 L28,7 Z" fill="#ff8a3c"/>
    <circle cx="11" cy="-10" r="9" fill="#fff"/><circle cx="14" cy="-10" r="4.5" fill="#1a2a1a"/>
  </g>
  <!-- dashed flight path to the correct gap -->
  <path d="M330 210 Q480 190 574 205" stroke="#7be08a" stroke-width="4" fill="none" stroke-dasharray="6 10" stroke-linecap="round" opacity="0.8"/>
  <rect x="0" y="466" width="960" height="74" fill="#04122a" fill-opacity="0.55"/>
  <text x="480" y="62" text-anchor="middle" font-size="58" font-weight="800" fill="url(#title)">🐤 Spell Flyer</text>
  <text x="480" y="512" text-anchor="middle" font-size="30" font-weight="700" fill="#a9d3ff">Flap through the correctly spelled word — dodge the misspelling!</text>
</svg>
